<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Fee Details - Finance Portal</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #10b981;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #d1fae5;
            color: #10b981;
        }
        
        .nav-item.active {
            background: #10b981;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 8px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .back-button:hover {
            border-color: #10b981;
            color: #10b981;
        }
        
        .student-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .student-header h2 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .student-header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .btn-primary {
            background: white;
            color: #10b981;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .btn-primary:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-card .amount {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-card .total { color: #333; }
        .stat-card .paid { color: #10b981; }
        .stat-card .balance { color: #ef4444; }
        
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .info-card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .info-item .label {
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
        }
        
        .info-item .value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }
        
        .fee-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .fee-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            color: #666;
            font-weight: 500;
        }
        
        .fee-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .fee-table tr:last-child td {
            border-bottom: none;
        }
        
        .fee-total-row {
            background: #f8f9fa;
            font-weight: bold;
        }
        
        .class-fee {
            background: #e6f7ff;
            border-left: 4px solid #10b981;
        }
        
        .individual-fee {
            background: #fff3cd;
            border-left: 4px solid #f59e0b;
        }
        
        .payment-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .payment-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            color: #666;
        }
        
        .payment-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .payment-success {
            background: #d1fae5;
            color: #065f46;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-coins"></i>
                <h2 id="financeName">Finance Officer</h2>
                <p id="financeSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-users"></i> Students Fees
                </a>
                <a href="add-student-fee.html" class="nav-item">
                    <i class="fas fa-plus-circle"></i> Add Student Fee
                </a>
                <a href="record-payment.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> Record Payment
                </a>
                <a href="receipts.html" class="nav-item">
                    <i class="fas fa-receipt"></i> Receipts
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Reports
                </a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-user-graduate" style="margin-right: 10px; color: #10b981;"></i>Student Fee Details</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <a href="students.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Students List
            </a>
            
            <div id="studentDetails">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading student details...
                </div>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let studentId = null;
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Get URL parameters
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'finance' && userData.role !== 'admin') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                currentSchoolId = userData.schoolId;
                
                document.getElementById('financeName').textContent = userData.name || 'Finance Officer';
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                document.getElementById('financeSchool').textContent = schoolDoc.data().name;
                
                // Get student ID from URL
                studentId = getUrlParameter('id');
                
                if (!studentId) {
                    showErrorMessage('No student ID provided');
                    return;
                }
                
                await loadStudentDetails();
                
            } catch (error) {
                console.error('Error:', error);
                showErrorMessage(error.message);
            }
        });
        
        function showErrorMessage(message) {
            const container = document.getElementById('studentDetails');
            container.innerHTML = `
                <div style="text-align: center; padding: 60px; background: white; border-radius: 12px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 60px; color: #ef4444; margin-bottom: 20px;"></i>
                    <h3>Error Loading Student</h3>
                    <p>${message}</p>
                    <a href="students.html" style="display: inline-block; margin-top: 20px; padding: 10px 20px; background: #10b981; color: white; text-decoration: none; border-radius: 8px;">Back to Students</a>
                </div>
            `;
        }
        
        async function loadStudentDetails() {
            try {
                // Get student data
                const studentDoc = await db.collection('students').doc(studentId).get();
                
                if (!studentDoc.exists) {
                    throw new Error('Student not found');
                }
                
                const student = { id: studentDoc.id, ...studentDoc.data() };
                
                // Get class-based fee structure
                let classFee = 0;
                let classFeeStructure = null;
                
                if (student.studentClass) {
                    const feeSnapshot = await db.collection('feeStructures')
                        .where('schoolId', '==', currentSchoolId)
                        .where('className', '==', student.studentClass)
                        .get();
                    
                    if (!feeSnapshot.empty) {
                        classFeeStructure = feeSnapshot.docs[0].data();
                        classFee = (classFeeStructure.tuition || 0) + (classFeeStructure.activity || 0) + 
                                  (classFeeStructure.library || 0) + (classFeeStructure.ict || 0) + (classFeeStructure.sports || 0);
                    }
                }
                
                // Get individual student fees
                const individualFeesSnapshot = await db.collection('studentFees')
                    .where('schoolId', '==', currentSchoolId)
                    .where('studentId', '==', studentId)
                    .where('status', '==', 'active')
                    .get();
                
                const individualFees = [];
                let totalIndividualFees = 0;
                
                individualFeesSnapshot.forEach(doc => {
                    const fee = doc.data();
                    individualFees.push({ id: doc.id, ...fee });
                    totalIndividualFees += fee.amount || 0;
                });
                
                // Calculate total fees
                const totalFees = classFee + totalIndividualFees;
                
                // Get payments
                const paymentsSnapshot = await db.collection('payments')
                    .where('schoolId', '==', currentSchoolId)
                    .where('studentId', '==', studentId)
                    .get();
                
                const payments = [];
                let totalPaid = 0;
                
                paymentsSnapshot.forEach(doc => {
                    const p = doc.data();
                    payments.push({ id: doc.id, ...p });
                    totalPaid += p.amount || 0;
                });
                
                // Sort payments by date
                payments.sort((a, b) => {
                    const dateA = a.date?.seconds || 0;
                    const dateB = b.date?.seconds || 0;
                    return dateB - dateA;
                });
                
                const balance = totalFees - totalPaid;
                
                displayStudentDetails(student, classFeeStructure, classFee, individualFees, totalIndividualFees, totalFees, totalPaid, balance, payments);
                
            } catch (error) {
                console.error('Error:', error);
                showErrorMessage(error.message);
            }
        }
        
        function displayStudentDetails(student, classFeeStructure, classFee, individualFees, totalIndividualFees, totalFees, totalPaid, balance, payments) {
            const container = document.getElementById('studentDetails');
            
            // Format student name
            const studentName = student.name || 
                               `${student.firstName || ''} ${student.lastName || ''}`.trim() || 
                               'Unknown Student';
            
            // Class fee breakdown
            let classFeeRows = '';
            if (classFeeStructure) {
                classFeeRows = `
                    <tr>
                        <td><strong>Class Fee (${student.studentClass})</strong></td>
                        <td>KES ${classFee.toLocaleString()}</td>
                        <td>Standard class fee</td>
                    </tr>
                `;
            }
            
            // Individual fees rows
            let individualFeeRows = '';
            if (individualFees.length > 0) {
                individualFees.forEach(fee => {
                    const dueDate = fee.dueDate?.seconds ? new Date(fee.dueDate.seconds * 1000).toLocaleDateString() : 'N/A';
                    individualFeeRows += `
                        <tr>
                            <td><strong>${fee.feeType.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase())}</strong></td>
                            <td>KES ${fee.amount.toLocaleString()}</td>
                            <td>${fee.description || ''} ${dueDate !== 'N/A' ? `(Due: ${dueDate})` : ''}</td>
                        </tr>
                    `;
                });
            }
            
            // Payment history rows
            let paymentRows = '';
            if (payments.length > 0) {
                payments.forEach(p => {
                    const date = p.date?.seconds ? new Date(p.date.seconds * 1000).toLocaleDateString() : 'N/A';
                    paymentRows += `
                        <tr>
                            <td>${date}</td>
                            <td>${p.method || 'N/A'}</td>
                            <td>${p.transactionCode || 'N/A'}</td>
                            <td><strong>KES ${(p.amount || 0).toLocaleString()}</strong></td>
                            <td><span class="payment-success">Paid</span></td>
                        </tr>
                    `;
                });
            } else {
                paymentRows = '<tr><td colspan="5" style="text-align: center; padding: 20px;">No payments recorded</td></tr>';
            }
            
            const html = `
                <div class="student-header">
                    <div>
                        <h2>${studentName}</h2>
                        <p>${student.admissionNumber || 'N/A'} | ${student.studentClass || 'N/A'}</p>
                    </div>
                    <div>
                        <a href="record-payment.html?student=${student.id}" class="btn-primary">
                            <i class="fas fa-credit-card"></i> Record Payment
                        </a>
                        <a href="add-student-fee.html?student=${student.id}" class="btn-primary" style="margin-left: 10px;">
                            <i class="fas fa-plus-circle"></i> Add Fee
                        </a>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Fees</h3>
                        <div class="amount total">KES ${totalFees.toLocaleString()}</div>
                        <small>Class: KES ${classFee.toLocaleString()} | Extra: KES ${totalIndividualFees.toLocaleString()}</small>
                    </div>
                    <div class="stat-card">
                        <h3>Amount Paid</h3>
                        <div class="amount paid">KES ${totalPaid.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Balance</h3>
                        <div class="amount balance">KES ${balance.toLocaleString()}</div>
                    </div>
                </div>
                
                <div class="info-card">
                    <h2><i class="fas fa-user"></i> Personal Information</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Full Name</div>
                            <div class="value">${studentName}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Admission Number</div>
                            <div class="value">${student.admissionNumber || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Class</div>
                            <div class="value">${student.studentClass || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Parent Phone</div>
                            <div class="value">${student.parentPhone || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Parent Email</div>
                            <div class="value">${student.parentEmail || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Date of Birth</div>
                            <div class="value">${student.dob ? new Date(student.dob).toLocaleDateString() : 'N/A'}</div>
                        </div>
                    </div>
                </div>
                
                <div class="info-card">
                    <h2><i class="fas fa-receipt"></i> Fee Breakdown</h2>
                    <table class="fee-table">
                        <thead>
                            <tr>
                                <th>Fee Type</th>
                                <th>Amount</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${classFeeRows}
                            ${individualFeeRows}
                            ${(!classFeeStructure && individualFees.length === 0) ? '<tr><td colspan="3" style="text-align: center;">No fees configured for this student</td></tr>' : ''}
                        </tbody>
                        <tfoot>
                            <tr class="fee-total-row">
                                <td><strong>TOTAL</strong></td>
                                <td><strong>KES ${totalFees.toLocaleString()}</strong></td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                
                <div class="info-card">
                    <h2><i class="fas fa-history"></i> Payment History</h2>
                    <table class="payment-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Method</th>
                                <th>Transaction</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${paymentRows}
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
