<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results - Admin</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .nav-item.active {
            background: #667eea;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .controls {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .control-group {
            flex: 1;
            min-width: 200px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        
        .control-group select,
        .control-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .stat-info h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-info .number {
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 20px;
        }
        
        .students-table-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .table-header h2 {
            color: #333;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            width: 250px;
        }
        
        .students-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .students-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            color: #666;
            font-weight: 500;
            font-size: 14px;
        }
        
        .students-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .students-table tr:hover td {
            background: #f8f9fa;
        }
        
        .student-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .student-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }
        
        .stream-badge {
            background: #f0f4ff;
            color: #667eea;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
        }
        
        .grade-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }
        
        .grade-A { background: #d1fae5; color: #065f46; }
        .grade-B { background: #dbeafe; color: #1e40af; }
        .grade-C { background: #fef3c7; color: #854d0e; }
        .grade-D { background: #fee2e2; color: #991b1b; }
        .grade-E { background: #fee2e2; color: #991b1b; }
        
        .btn-icon {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }
        
        .btn-icon:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .no-data {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .pagination button {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-school"></i>
                <h2 id="schoolName">Loading...</h2>
                <p id="schoolType"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="teachers.html" class="nav-item">
                    <i class="fas fa-users"></i> Teachers
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-user-graduate"></i> Students
                </a>
                <a href="parents.html" class="nav-item">
                    <i class="fas fa-family"></i> Parents
                </a>
                <a href="classes.html" class="nav-item">
                    <i class="fas fa-book"></i> Classes
                </a>
                <a href="student-results.html" class="nav-item active">
                    <i class="fas fa-chart-line"></i> Student Results
                </a>
                <a href="fee-structure.html" class="nav-item">
                    <i class="fas fa-coins"></i> Fee Structure
                </a>
                <a href="fee-payments.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> Payments
                </a>
                <a href="fee-reports.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Reports
                </a>
                <a href="notifications.html" class="nav-item">
                    <i class="fas fa-bell"></i> Notifications
                </a>
            </nav>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-chart-line" style="margin-right: 10px; color: #667eea;"></i>Student Results</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <div class="control-group">
                    <label><i class="fas fa-school"></i> Select Class</label>
                    <select id="classSelect" onchange="loadStudents()">
                        <option value="">Loading classes...</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label><i class="fas fa-calendar"></i> Term</label>
                    <select id="termSelect">
                        <option value="Term 1">Term 1</option>
                        <option value="Term 2">Term 2</option>
                        <option value="Term 3">Term 3</option>
                    </select>
                </div>
                
                <button class="btn-primary" onclick="loadStudents()">
                    <i class="fas fa-search"></i> Load Students
                </button>
            </div>
            
            <!-- Stats -->
            <div class="stats-grid" id="statsContainer">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Students</h3>
                        <div class="number" id="totalStudents">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>With Results</h3>
                        <div class="number" id="withResults">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Class Average</h3>
                        <div class="number" id="classAverage">-</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                </div>
            </div>
            
            <!-- Students Table -->
            <div class="students-table-container">
                <div class="table-header">
                    <h2><i class="fas fa-users"></i> Students in <span id="selectedClass"></span></h2>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search student...">
                    </div>
                </div>
                
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Admission</th>
                            <th>Stream</th>
                            <th>Subjects</th>
                            <th>Average</th>
                            <th>Grade</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 50px;">
                                <i class="fas fa-spinner fa-spin"></i> Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <button onclick="prevPage()" id="prevBtn" disabled>Previous</button>
                    <span id="pageInfo">Page 1 of 1</span>
                    <button onclick="nextPage()" id="nextBtn" disabled>Next</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Message Toast -->
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let allClasses = [];
        let allStudents = [];
        let allMarks = [];
        let filteredStudents = [];
        let currentPage = 1;
        const itemsPerPage = 15;
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'admin') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                currentSchoolId = userData.schoolId;
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                document.getElementById('schoolName').textContent = schoolDoc.data().name;
                document.getElementById('schoolType').textContent = 
                    schoolDoc.data().type === 'primary' ? 'Primary School' : 'High School';
                
                await loadAllData();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadAllData() {
            try {
                showMessage('Loading data...', 'info');
                
                // Load classes from database
                const classesSnapshot = await db.collection('classes')
                    .where('schoolId', '==', currentSchoolId)
                    .orderBy('name')
                    .get();
                
                allClasses = [];
                classesSnapshot.forEach(doc => {
                    allClasses.push({
                        id: doc.id,
                        name: doc.data().name
                    });
                });
                
                // Populate class dropdown
                const classSelect = document.getElementById('classSelect');
                classSelect.innerHTML = '<option value="">Select Class</option>';
                
                allClasses.forEach(cls => {
                    const option = document.createElement('option');
                    option.value = cls.name;
                    option.textContent = cls.name;
                    classSelect.appendChild(option);
                });
                
                // Load all students
                await loadAllStudents();
                
                // Load all marks
                await loadAllMarks();
                
                showMessage('Data loaded successfully', 'success');
                
            } catch (error) {
                console.error('Error loading data:', error);
                showMessage('Error loading data', 'error');
            }
        }
        
        async function loadAllStudents() {
            const snapshot = await db.collection('students')
                .where('schoolId', '==', currentSchoolId)
                .where('status', '==', 'active')
                .get();
            
            allStudents = [];
            snapshot.forEach(doc => {
                allStudents.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            
            console.log('Loaded students:', allStudents.length);
        }
        
        async function loadAllMarks() {
            const snapshot = await db.collection('marks')
                .where('schoolId', '==', currentSchoolId)
                .get();
            
            allMarks = [];
            snapshot.forEach(doc => {
                allMarks.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            
            console.log('Loaded marks:', allMarks.length);
        }
        
        function loadStudents() {
            const selectedClass = document.getElementById('classSelect').value;
            const term = document.getElementById('termSelect').value;
            
            if (!selectedClass) {
                showMessage('Please select a class', 'error');
                return;
            }
            
            document.getElementById('selectedClass').textContent = selectedClass;
            
            // 🔥 FIX: Find all students whose class/stream CONTAINS the selected class name
            // This handles: "FORM 1 - NORTH", "FORM 1 EAST", "1 WEST", etc.
            const classStudents = allStudents.filter(s => {
                if (!s.studentClass) return false;
                
                // Convert to uppercase for case-insensitive comparison
                const studentClass = s.studentClass.toUpperCase();
                const searchClass = selectedClass.toUpperCase();
                
                // Check if student's class contains the selected class name
                // Examples:
                // - "FORM 1 - NORTH" contains "FORM 1" ✅
                // - "1 WEST" contains "1" but we need full "FORM 1" match
                
                // For "FORM 1", check if student class starts with "FORM 1" or contains "FORM 1"
                if (searchClass.includes('FORM')) {
                    return studentClass.includes(searchClass) || 
                           studentClass.includes(searchClass.replace('FORM ', ''));
                } else {
                    // For other naming conventions
                    return studentClass.includes(searchClass);
                }
            });
            
            console.log(`Found ${classStudents.length} students in ${selectedClass}`);
            
            if (classStudents.length === 0) {
                document.getElementById('studentsTableBody').innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 50px;">
                            <i class="fas fa-users" style="font-size: 40px; color: #cbd5e0; margin-bottom: 10px; display: block;"></i>
                            No students found in ${selectedClass}
                        </td>
                    </tr>
                `;
                document.getElementById('statsContainer').style.display = 'none';
                document.getElementById('pagination').style.display = 'none';
                return;
            }
            
            // Calculate results for each student
            const studentsWithResults = classStudents.map(student => {
                // Get marks for this student in the selected term
                const studentMarks = allMarks.filter(m => 
                    m.studentId === student.id && 
                    m.term === term
                );
                
                // Calculate average
                let average = 0;
                let grade = '-';
                let subjectCount = 0;
                
                if (studentMarks.length > 0) {
                    const total = studentMarks.reduce((sum, m) => sum + m.score, 0);
                    average = Math.round(total / studentMarks.length);
                    grade = calculateGrade(average);
                    subjectCount = studentMarks.length;
                }
                
                return {
                    ...student,
                    marks: studentMarks,
                    average,
                    grade,
                    subjectCount,
                    hasResults: studentMarks.length > 0
                };
            });
            
            // Sort by name
            studentsWithResults.sort((a, b) => 
                (a.firstName || '').localeCompare(b.firstName || '')
            );
            
            filteredStudents = studentsWithResults;
            currentPage = 1;
            displayStudents();
            updateStats(studentsWithResults);
        }
        
        function calculateGrade(score) {
            if (score >= 80) return 'A';
            if (score >= 70) return 'B';
            if (score >= 60) return 'C';
            if (score >= 50) return 'D';
            return 'E';
        }
        
        function updateStats(students) {
            document.getElementById('statsContainer').style.display = 'grid';
            
            const total = students.length;
            const withResults = students.filter(s => s.hasResults).length;
            
            let totalAverage = 0;
            let validCount = 0;
            
            students.forEach(s => {
                if (s.average > 0) {
                    totalAverage += s.average;
                    validCount++;
                }
            });
            
            const classAvg = validCount > 0 ? Math.round(totalAverage / validCount) : 0;
            
            document.getElementById('totalStudents').textContent = total;
            document.getElementById('withResults').textContent = withResults;
            document.getElementById('classAverage').textContent = classAvg > 0 ? classAvg + '%' : '-';
        }
        
        function displayStudents() {
            const tbody = document.getElementById('studentsTableBody');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let displayList = filteredStudents;
            
            if (searchTerm) {
                displayList = filteredStudents.filter(s => 
                    (s.firstName?.toLowerCase() + ' ' + s.lastName?.toLowerCase()).includes(searchTerm) ||
                    s.admissionNumber?.toLowerCase().includes(searchTerm)
                );
            }
            
            if (displayList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 50px;">No students found</td></tr>';
                document.getElementById('pagination').style.display = 'none';
                return;
            }
            
            document.getElementById('pagination').style.display = 'flex';
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageStudents = displayList.slice(start, end);
            
            const totalPages = Math.ceil(displayList.length / itemsPerPage);
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            
            let html = '';
            pageStudents.forEach(s => {
                const initials = ((s.firstName?.[0] || '') + (s.lastName?.[0] || '')).toUpperCase() || 'S';
                const gradeClass = s.grade !== '-' ? `grade-${s.grade}` : '';
                
                html += `
                    <tr>
                        <td>
                            <div class="student-info">
                                <div class="student-avatar">${initials}</div>
                                <div>
                                    <strong>${s.firstName || ''} ${s.lastName || ''}</strong>
                                </div>
                            </div>
                        </td>
                        <td>${s.admissionNumber || 'N/A'}</td>
                        <td><span class="stream-badge">${s.studentClass || 'N/A'}</span></td>
                        <td>${s.subjectCount || 0} subjects</td>
                        <td><strong>${s.average > 0 ? s.average + '%' : '-'}</strong></td>
                        <td><span class="grade-badge ${gradeClass}">${s.grade}</span></td>
                        <td>
                            <a href="result-slip.html?student=${s.id}&term=${document.getElementById('termSelect').value}" class="btn-icon" target="_blank">
                                <i class="fas fa-file-alt"></i> View Slip
                            </a>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                displayStudents();
            }
        }
        
        function nextPage() {
            const totalPages = Math.ceil(filteredStudents.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                displayStudents();
            }
        }
        
        document.getElementById('searchInput').addEventListener('input', displayStudents);
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
