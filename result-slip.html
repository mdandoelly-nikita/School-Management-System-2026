<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Slip - Admin</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- html2pdf for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
            padding: 30px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .back-link {
            margin-bottom: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .result-slip {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }
        
        .school-name {
            color: #667eea;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .report-title {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .term-info {
            color: #666;
            font-size: 16px;
        }
        
        .student-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
        }
        
        .info-item .label {
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
        }
        
        .info-item .value {
            color: #333;
            font-size: 18px;
            font-weight: 600;
        }
        
        .subjects-table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
        }
        
        .subjects-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 500;
        }
        
        .subjects-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .grade-A { color: #10b981; font-weight: bold; }
        .grade-B { color: #3b82f6; font-weight: bold; }
        .grade-C { color: #f59e0b; font-weight: bold; }
        .grade-D { color: #ef4444; font-weight: bold; }
        .grade-E { color: #ef4444; font-weight: bold; }
        
        .remarks {
            color: #666;
            font-style: italic;
        }
        
        .summary {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .total-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .total-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .grade-box {
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-align: center;
        }
        
        .grade-box .label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .grade-box .value {
            font-size: 48px;
            font-weight: bold;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-secondary:hover {
            background: #f8f9fa;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .back-link, .action-buttons {
                display: none !important;
            }
            .result-slip {
                box-shadow: none;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back-link">
            <a href="student-results.html"><i class="fas fa-arrow-left"></i> Back to Results</a>
        </div>
        
        <div id="resultContainer">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading student result...
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let schoolName = '';
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'admin') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                currentSchoolId = userData.schoolId;
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                schoolName = schoolDoc.data().name;
                
                const studentId = getUrlParameter('student');
                const term = getUrlParameter('term') || 'Term 1';
                
                if (!studentId) {
                    showErrorMessage('No student selected');
                    return;
                }
                
                await loadStudentResult(studentId, term);
                
            } catch (error) {
                console.error('Error:', error);
                showErrorMessage(error.message);
            }
        });
        
        function showErrorMessage(message) {
            document.getElementById('resultContainer').innerHTML = `
                <div style="text-align: center; padding: 60px; background: white; border-radius: 12px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 60px; color: #ef4444; margin-bottom: 20px;"></i>
                    <h3>Error Loading Result</h3>
                    <p>${message}</p>
                    <a href="student-results.html" style="display: inline-block; margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 8px;">Back to Results</a>
                </div>
            `;
        }
        
        async function loadStudentResult(studentId, term) {
            try {
                // Get student data
                const studentDoc = await db.collection('students').doc(studentId).get();
                
                if (!studentDoc.exists) {
                    throw new Error('Student not found');
                }
                
                const student = { id: studentDoc.id, ...studentDoc.data() };
                
                // Get marks for this student
                const marksSnapshot = await db.collection('marks')
                    .where('schoolId', '==', currentSchoolId)
                    .where('studentId', '==', studentId)
                    .where('term', '==', term)
                    .get();
                
                const marks = [];
                marksSnapshot.forEach(doc => {
                    marks.push(doc.data());
                });
                
                // Sort by subject
                marks.sort((a, b) => a.subject.localeCompare(b.subject));
                
                displayResultSlip(student, marks, term);
                
            } catch (error) {
                console.error('Error loading result:', error);
                showErrorMessage(error.message);
            }
        }
        
        function calculateGrade(score) {
            if (score >= 80) return 'A';
            if (score >= 70) return 'B';
            if (score >= 60) return 'C';
            if (score >= 50) return 'D';
            return 'E';
        }
        
        function getRemarks(grade) {
            switch(grade) {
                case 'A': return 'Excellent';
                case 'B': return 'Very Good';
                case 'C': return 'Good';
                case 'D': return 'Fair';
                case 'E': return 'Needs Improvement';
                default: return '-';
            }
        }
        
        function displayResultSlip(student, marks, term) {
            const container = document.getElementById('resultContainer');
            
            // Calculate totals
            let totalScore = 0;
            let subjectsWithMarks = 0;
            
            marks.forEach(m => {
                if (m.score) {
                    totalScore += m.score;
                    subjectsWithMarks++;
                }
            });
            
            const average = subjectsWithMarks > 0 ? Math.round(totalScore / subjectsWithMarks) : 0;
            const overallGrade = calculateGrade(average);
            
            // Build table rows
            let tableRows = '';
            marks.forEach(mark => {
                const grade = calculateGrade(mark.score);
                const gradeClass = `grade-${grade}`;
                const remarks = getRemarks(grade);
                
                tableRows += `
                    <tr>
                        <td><strong>${mark.subject}</strong></td>
                        <td>${mark.score}%</td>
                        <td class="${gradeClass}">${grade}</td>
                        <td class="remarks">${remarks}</td>
                    </tr>
                `;
            });
            
            // If no marks, show message
            if (marks.length === 0) {
                tableRows = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 30px;">
                            No results found for this term
                        </td>
                    </tr>
                `;
            }
            
            const html = `
                <div class="result-slip" id="resultSlip">
                    <div class="header">
                        <div class="school-name">${schoolName}</div>
                        <div class="report-title">Academic Report</div>
                        <div class="term-info">${term} - ${new Date().getFullYear()}</div>
                    </div>
                    
                    <div class="student-info">
                        <div class="info-item">
                            <span class="label">Student Name</span>
                            <span class="value">${student.firstName || ''} ${student.lastName || ''}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Admission Number</span>
                            <span class="value">${student.admissionNumber || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Class/Stream</span>
                            <span class="value">${student.studentClass || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="label">Term</span>
                            <span class="value">${term}</span>
                        </div>
                    </div>
                    
                    <table class="subjects-table">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Score</th>
                                <th>Grade</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                    
                    ${marks.length > 0 ? `
                        <div class="summary">
                            <div class="total-box">
                                <div class="total-label">Average Score</div>
                                <div class="total-value">${average}%</div>
                            </div>
                            <div class="grade-box">
                                <div class="label">Overall Grade</div>
                                <div class="value">${overallGrade}</div>
                            </div>
                        </div>
                    ` : ''}
                </div>
                
                <div class="action-buttons">
                    <button class="btn-secondary" onclick="window.print()">
                        <i class="fas fa-print"></i> Print
                    </button>
                    <button class="btn-primary" onclick="downloadPDF()">
                        <i class="fas fa-download"></i> Download PDF
                    </button>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        function downloadPDF() {
            const element = document.getElementById('resultSlip');
            const studentName = document.querySelector('.student-info .value')?.textContent || 'student';
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `${studentName}_results.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save();
            showMessage('Generating PDF...', 'info');
        }
    </script>
</body>
</html>
