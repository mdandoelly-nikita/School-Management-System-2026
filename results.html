<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Results - Student Portal</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #4f46e5;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #eef2ff;
            color: #4f46e5;
        }
        
        .nav-item.active {
            background: #4f46e5;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .term-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .term-btn {
            padding: 10px 25px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            flex: 1;
        }
        
        .term-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        
        .term-btn:hover {
            border-color: #4f46e5;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-card .number {
            color: #333;
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-card .grade {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .grade-A { color: #10b981; }
        .grade-B { color: #3b82f6; }
        .grade-C { color: #f59e0b; }
        .grade-D { color: #ef4444; }
        
        .results-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .results-card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .results-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            color: #666;
            font-weight: 500;
        }
        
        .results-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .results-table tr:last-child td {
            border-bottom: none;
        }
        
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            height: 300px;
        }
        
        .print-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        @media print {
            .sidebar, .top-bar, .term-selector, .print-btn {
                display: none !important;
            }
            .main-content {
                margin-left: 0;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-user-graduate"></i>
                <h2 id="studentName">Student</h2>
                <p id="studentSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="results.html" class="nav-item active">
                    <i class="fas fa-chart-line"></i> My Results
                </a>
                <a href="fees.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> My Fees
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="fas fa-user"></i> Profile
                </a>
            </nav>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-chart-line" style="margin-right: 10px; color: #4f46e5;"></i>My Results</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <!-- Term Selector -->
            <div class="term-selector">
                <button class="term-btn active" onclick="loadTerm('Term 1')">Term 1</button>
                <button class="term-btn" onclick="loadTerm('Term 2')">Term 2</button>
                <button class="term-btn" onclick="loadTerm('Term 3')">Term 3</button>
            </div>
            
            <!-- Stats -->
            <div class="stats-grid" id="statsContainer">
                <div class="stat-card">
                    <h3>Average Score</h3>
                    <div class="number" id="avgScore">-</div>
                </div>
                <div class="stat-card">
                    <h3>Grade</h3>
                    <div class="grade" id="avgGrade">-</div>
                </div>
                <div class="stat-card">
                    <h3>Subjects</h3>
                    <div class="number" id="subjectCount">0</div>
                </div>
            </div>
            
            <!-- Chart -->
            <div class="chart-container">
                <canvas id="resultsChart"></canvas>
            </div>
            
            <!-- Results Table -->
            <div class="results-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2><i class="fas fa-list"></i> Subject Breakdown</h2>
                    <button class="print-btn" onclick="printResults()">
                        <i class="fas fa-print"></i> Print Report
                    </button>
                </div>
                
                <div id="resultsContainer">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Loading results...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Message Toast -->
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let studentData = null;
        let studentId = null;
        let schoolId = null;
        let currentTerm = 'Term 1';
        let resultsChart = null;
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    showMessage('User data not found', 'error');
                    return;
                }
                
                const userData = userDoc.data();
                
                if (userData.role !== 'student') {
                    showMessage('Access denied', 'error');
                    return;
                }
                
                studentId = userData.studentId;
                schoolId = userData.schoolId;
                
                const studentDoc = await db.collection('students').doc(studentId).get();
                studentData = studentDoc.data();
                
                document.getElementById('studentName').textContent = studentData.name || 'Student';
                
                const schoolDoc = await db.collection('schools').doc(schoolId).get();
                if (schoolDoc.exists) {
                    document.getElementById('studentSchool').textContent = schoolDoc.data().name;
                }
                
                loadResults();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadResults() {
            try {
                const snapshot = await db.collection('marks')
                    .where('schoolId', '==', schoolId)
                    .where('studentId', '==', studentId)
                    .where('term', '==', currentTerm)
                    .get();
                
                const container = document.getElementById('resultsContainer');
                
                if (snapshot.empty) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-chart-line"></i>
                            <h3>No Results Found</h3>
                            <p>No results available for ${currentTerm}.</p>
                        </div>
                    `;
                    document.getElementById('avgScore').textContent = '-';
                    document.getElementById('avgGrade').textContent = '-';
                    document.getElementById('subjectCount').textContent = '0';
                    return;
                }
                
                const marks = [];
                snapshot.forEach(doc => {
                    marks.push(doc.data());
                });
                
                marks.sort((a, b) => a.subject.localeCompare(b.subject));
                
                const total = marks.reduce((sum, m) => sum + m.score, 0);
                const average = Math.round(total / marks.length);
                const avgGrade = calculateGrade(average);
                
                document.getElementById('avgScore').textContent = average + '%';
                document.getElementById('avgGrade').textContent = avgGrade;
                document.getElementById('avgGrade').className = `grade grade-${avgGrade}`;
                document.getElementById('subjectCount').textContent = marks.length;
                
                let tableHtml = `
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>Score</th>
                                <th>Grade</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                marks.forEach(m => {
                    const remarks = getRemarks(m.grade);
                    tableHtml += `
                        <tr>
                            <td><strong>${m.subject}</strong></td>
                            <td>${m.score}%</td>
                            <td class="grade-${m.grade}">${m.grade}</td>
                            <td>${remarks}</td>
                        </tr>
                    `;
                });
                
                tableHtml += '</tbody></table>';
                container.innerHTML = tableHtml;
                
                createChart(marks);
                
            } catch (error) {
                console.error('Error loading results:', error);
                showMessage('Error loading results', 'error');
            }
        }
        
        function createChart(marks) {
            const ctx = document.getElementById('resultsChart').getContext('2d');
            
            if (resultsChart) {
                resultsChart.destroy();
            }
            
            resultsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: marks.map(m => m.subject),
                    datasets: [{
                        label: 'Score (%)',
                        data: marks.map(m => m.score),
                        backgroundColor: '#4f46e5',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });
        }
        
        function calculateGrade(score) {
            if (score >= 80) return 'A';
            if (score >= 70) return 'B';
            if (score >= 60) return 'C';
            if (score >= 50) return 'D';
            return 'E';
        }
        
        function getRemarks(grade) {
            switch(grade) {
                case 'A': return 'Excellent';
                case 'B': return 'Very Good';
                case 'C': return 'Good';
                case 'D': return 'Fair';
                case 'E': return 'Needs Improvement';
                default: return '-';
            }
        }
        
        function loadTerm(term) {
            currentTerm = term;
            
            document.querySelectorAll('.term-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === term) {
                    btn.classList.add('active');
                }
            });
            
            loadResults();
        }
        
        function printResults() {
            window.print();
        }
        
        function logout() {
            auth.signOut().then(() => {
                window.location.href = '../../login.html';
            });
        }
    </script>
</body>
</html>
