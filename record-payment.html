<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Payment - Finance Portal</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #10b981;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #d1fae5;
            color: #10b981;
        }
        
        .nav-item.active {
            background: #10b981;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .payment-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .student-selector {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .student-selector h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #10b981;
        }
        
        .search-box button {
            padding: 12px 25px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .student-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        
        .student-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .student-item:hover {
            background: #d1fae5;
        }
        
        .student-item.selected {
            background: #10b981;
            color: white;
        }
        
        .student-item.selected .student-balance {
            color: white;
        }
        
        .student-info h4 {
            margin-bottom: 5px;
        }
        
        .student-info p {
            color: #666;
            font-size: 13px;
        }
        
        .student-item.selected .student-info p {
            color: #e0e0e0;
        }
        
        .student-balance {
            font-weight: bold;
            color: #ef4444;
        }
        
        .payment-form {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .payment-form h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .selected-student-info {
            background: #d1fae5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .selected-student-info h3 {
            color: #065f46;
            margin-bottom: 5px;
        }
        
        .selected-student-info p {
            color: #065f46;
            font-size: 14px;
        }
        
        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: #065f46;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #10b981;
        }
        
        .form-group input[readonly] {
            background: #f8f9fa;
            color: #333;
            font-weight: 500;
        }
        
        .payment-summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .summary-row.total {
            font-weight: bold;
            font-size: 18px;
            border-top: 2px solid #e0e0e0;
            padding-top: 10px;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }
        
        .btn-primary:hover {
            background: #059669;
        }
        
        .btn-primary:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .receipt-preview {
            text-align: center;
            margin: 20px 0;
        }
        
        .receipt-preview i {
            font-size: 60px;
            color: #10b981;
            margin-bottom: 15px;
        }
        
        .receipt-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        
        .receipt-details p {
            margin: 10px 0;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-coins"></i>
                <h2 id="financeName">Finance Officer</h2>
                <p id="financeSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-users"></i> Students Fees
                </a>
                <a href="record-payment.html" class="nav-item active">
                    <i class="fas fa-credit-card"></i> Record Payment
                </a>
                <a href="receipts.html" class="nav-item">
                    <i class="fas fa-receipt"></i> Receipts
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Reports
                </a>
                <a href="add-student-fee.html" class="nav-item">
                    <i class="fas fa-plus-circle"></i> Add Student Fee
                </a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-credit-card" style="margin-right: 10px; color: #10b981;"></i>Record Payment</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="payment-container">
                <!-- Student Selector -->
                <div class="student-selector">
                    <h2><i class="fas fa-user-graduate"></i> Select Student</h2>
                    
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search by name or admission number...">
                        <button onclick="searchStudents()"><i class="fas fa-search"></i> Search</button>
                    </div>
                    
                    <div id="studentList" class="student-list">
                        <div class="loading">Loading students...</div>
                    </div>
                </div>
                
                <!-- Payment Form -->
                <div class="payment-form" id="paymentForm" style="display: none;">
                    <h2><i class="fas fa-money-bill"></i> Payment Details</h2>
                    
                    <div id="selectedStudentInfo" class="selected-student-info">
                        <!-- Will be filled dynamically -->
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Payment Amount (KES)</label>
                            <input type="number" id="paymentAmount" min="1" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Payment Method</label>
                            <select id="paymentMethod" required>
                                <option value="Cash">Cash</option>
                                <option value="M-Pesa">M-Pesa</option>
                                <option value="Bank Transfer">Bank Transfer</option>
                                <option value="Cheque">Cheque</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Transaction Reference</label>
                            <input type="text" id="transactionCode" placeholder="e.g., MPESA123">
                        </div>
                        
                        <div class="form-group">
                            <label>Payment Date</label>
                            <input type="date" id="paymentDate" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Notes (Optional)</label>
                        <input type="text" id="paymentNotes" placeholder="Any additional information">
                    </div>
                    
                    <div class="payment-summary" id="paymentSummary">
                        <!-- Will be filled dynamically -->
                    </div>
                    
                    <button class="btn-primary" onclick="processPayment()" id="processBtn">
                        <i class="fas fa-check-circle"></i> Process Payment & Print Receipt
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-receipt"></i> Payment Receipt</h2>
                <button class="close-btn" onclick="closeReceiptModal()">&times;</button>
            </div>
            
            <div class="receipt-preview">
                <i class="fas fa-check-circle"></i>
                <h3>Payment Successful!</h3>
            </div>
            
            <div id="receiptDetails" class="receipt-details">
                <!-- Receipt details will be inserted here -->
            </div>
            
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeReceiptModal()">Close</button>
                <button class="btn-primary" onclick="printReceipt()">
                    <i class="fas fa-print"></i> Print Receipt
                </button>
                <button class="btn-primary" onclick="newPayment()">
                    <i class="fas fa-plus"></i> New Payment
                </button>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let students = [];
        let feeStructures = [];
        let payments = [];
        let selectedStudent = null;
        let currentReceipt = null;
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'finance' && userData.role !== 'admin') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                currentSchoolId = userData.schoolId;
                
                document.getElementById('financeName').textContent = userData.name || 'Finance Officer';
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                document.getElementById('financeSchool').textContent = schoolDoc.data().name;
                
                // Set default date to today
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('paymentDate').value = today;
                
                await loadData();
                
                // Check if student ID is in URL
                const urlParams = new URLSearchParams(window.location.search);
                const studentId = urlParams.get('student');
                if (studentId) {
                    selectStudentById(studentId);
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadData() {
            await Promise.all([
                loadStudents(),
                loadFeeStructures(),
                loadPayments()
            ]);
            
            displayStudentList();
        }
        
        async function loadStudents() {
            const snapshot = await db.collection('students')
                .where('schoolId', '==', currentSchoolId)
                .where('status', '==', 'active')
                .get();
            
            students = [];
            snapshot.forEach(doc => {
                students.push({ id: doc.id, ...doc.data() });
            });
        }
        
        async function loadFeeStructures() {
            const snapshot = await db.collection('feeStructures')
                .where('schoolId', '==', currentSchoolId)
                .get();
            
            feeStructures = [];
            snapshot.forEach(doc => {
                feeStructures.push({ id: doc.id, ...doc.data() });
            });
        }
        
        async function loadPayments() {
            const snapshot = await db.collection('payments')
                .where('schoolId', '==', currentSchoolId)
                .get();
            
            payments = [];
            snapshot.forEach(doc => {
                payments.push({ id: doc.id, ...doc.data() });
            });
        }
        
        function calculateStudentBalance(studentId) {
            const student = students.find(s => s.id === studentId);
            if (!student) return 0;
            
            const feeStructure = feeStructures.find(f => f.className === student.studentClass);
            let totalFee = 0;
            if (feeStructure) {
                totalFee = (feeStructure.tuition || 0) + (feeStructure.activity || 0) + 
                          (feeStructure.library || 0) + (feeStructure.ict || 0) + (feeStructure.sports || 0);
            }
            
            const studentPayments = payments.filter(p => p.studentId === studentId);
            const paidAmount = studentPayments.reduce((sum, p) => sum + (p.amount || 0), 0);
            
            return totalFee - paidAmount;
        }
        
        function displayStudentList() {
            const container = document.getElementById('studentList');
            
            if (students.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 30px;">No students found</div>';
                return;
            }
            
            let html = '';
            students.forEach(student => {
                const balance = calculateStudentBalance(student.id);
                const initials = ((student.firstName?.[0] || '') + (student.lastName?.[0] || '')).toUpperCase() || 'S';
                
                html += `
                    <div class="student-item" onclick="selectStudent('${student.id}')">
                        <div class="student-info">
                            <h4>${student.firstName || ''} ${student.lastName || ''}</h4>
                            <p>${student.admissionNumber || 'N/A'} | ${student.studentClass || 'N/A'}</p>
                        </div>
                        <div class="student-balance">KES ${balance.toLocaleString()}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function searchStudents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = students.filter(s => 
                (s.firstName?.toLowerCase() + ' ' + s.lastName?.toLowerCase()).includes(searchTerm) ||
                s.admissionNumber?.toLowerCase().includes(searchTerm)
            );
            
            const container = document.getElementById('studentList');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 30px;">No matching students</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(student => {
                const balance = calculateStudentBalance(student.id);
                
                html += `
                    <div class="student-item" onclick="selectStudent('${student.id}')">
                        <div class="student-info">
                            <h4>${student.firstName || ''} ${student.lastName || ''}</h4>
                            <p>${student.admissionNumber || 'N/A'} | ${student.studentClass || 'N/A'}</p>
                        </div>
                        <div class="student-balance">KES ${balance.toLocaleString()}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function selectStudent(studentId) {
            const student = students.find(s => s.id === studentId);
            if (!student) return;
            
            selectedStudent = student;
            
            // Highlight selected student
            document.querySelectorAll('.student-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            const selectedItem = Array.from(document.querySelectorAll('.student-item')).find(
                item => item.querySelector('h4')?.textContent.includes(student.firstName)
            );
            
            if (selectedItem) {
                selectedItem.classList.add('selected');
            }
            
            const balance = calculateStudentBalance(student.id);
            
            const infoHtml = `
                <div>
                    <h3>${student.firstName || ''} ${student.lastName || ''}</h3>
                    <p>${student.admissionNumber || 'N/A'} | ${student.studentClass || 'N/A'}</p>
                </div>
                <div>
                    <span class="balance-amount">KES ${balance.toLocaleString()}</span>
                </div>
            `;
            
            document.getElementById('selectedStudentInfo').innerHTML = infoHtml;
            
            // Show payment form
            document.getElementById('paymentForm').style.display = 'block';
            
            // Update payment summary
            updatePaymentSummary(0);
            
            // Add input listener for amount
            document.getElementById('paymentAmount').addEventListener('input', function() {
                const amount = parseInt(this.value) || 0;
                updatePaymentSummary(amount);
            });
        }
        
        function selectStudentById(studentId) {
            const student = students.find(s => s.id === studentId);
            if (student) {
                selectStudent(studentId);
            }
        }
        
        function updatePaymentSummary(amount) {
            const balance = calculateStudentBalance(selectedStudent.id);
            const newBalance = balance - amount;
            
            const summaryHtml = `
                <div class="summary-row">
                    <span>Current Balance:</span>
                    <span>KES ${balance.toLocaleString()}</span>
                </div>
                <div class="summary-row">
                    <span>Payment Amount:</span>
                    <span class="amount-paid">KES ${amount.toLocaleString()}</span>
                </div>
                <div class="summary-row total">
                    <span>New Balance:</span>
                    <span class="${newBalance < 0 ? 'amount-paid' : 'amount-balance'}">KES ${newBalance.toLocaleString()}</span>
                </div>
            `;
            
            document.getElementById('paymentSummary').innerHTML = summaryHtml;
        }
        
        async function processPayment() {
            if (!selectedStudent) {
                showMessage('Please select a student', 'error');
                return;
            }
            
            const amount = parseInt(document.getElementById('paymentAmount').value);
            if (!amount || amount <= 0) {
                showMessage('Please enter a valid amount', 'error');
                return;
            }
            
            const balance = calculateStudentBalance(selectedStudent.id);
            if (amount > balance) {
                if (!confirm(`Payment amount (KES ${amount}) exceeds balance (KES ${balance}). Continue anyway?`)) {
                    return;
                }
            }
            
            const processBtn = document.getElementById('processBtn');
            processBtn.disabled = true;
            processBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            try {
                const paymentData = {
                    schoolId: currentSchoolId,
                    studentId: selectedStudent.id,
                    studentName: `${selectedStudent.firstName} ${selectedStudent.lastName}`,
                    className: selectedStudent.studentClass,
                    admissionNumber: selectedStudent.admissionNumber,
                    amount: amount,
                    method: document.getElementById('paymentMethod').value,
                    transactionCode: document.getElementById('transactionCode').value || 'N/A',
                    date: firebase.firestore.Timestamp.fromDate(new Date(document.getElementById('paymentDate').value)),
                    notes: document.getElementById('paymentNotes').value,
                    status: 'completed',
                    recordedBy: currentUser.uid,
                    recordedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                const docRef = await db.collection('payments').add(paymentData);
                
                // Show receipt
                currentReceipt = {
                    id: docRef.id,
                    ...paymentData
                };
                
                showReceipt();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error processing payment: ' + error.message, 'error');
                processBtn.disabled = false;
                processBtn.innerHTML = '<i class="fas fa-check-circle"></i> Process Payment & Print Receipt';
            }
        }
        
        function showReceipt() {
            if (!currentReceipt) return;
            
            const receiptHtml = `
                <p><strong>Receipt No:</strong> ${currentReceipt.id.slice(-8).toUpperCase()}</p>
                <p><strong>Date:</strong> ${new Date().toLocaleDateString()}</p>
                <p><strong>Student:</strong> ${currentReceipt.studentName}</p>
                <p><strong>Admission:</strong> ${currentReceipt.admissionNumber}</p>
                <p><strong>Class:</strong> ${currentReceipt.className}</p>
                <p><strong>Amount:</strong> KES ${currentReceipt.amount.toLocaleString()}</p>
                <p><strong>Method:</strong> ${currentReceipt.method}</p>
                <p><strong>Transaction:</strong> ${currentReceipt.transactionCode}</p>
                <p><strong>Balance:</strong> KES ${calculateStudentBalance(selectedStudent.id).toLocaleString()}</p>
            `;
            
            document.getElementById('receiptDetails').innerHTML = receiptHtml;
            document.getElementById('receiptModal').classList.add('active');
            
            // Reset form
            document.getElementById('processBtn').disabled = false;
            document.getElementById('processBtn').innerHTML = '<i class="fas fa-check-circle"></i> Process Payment & Print Receipt';
            document.getElementById('paymentAmount').value = '';
            document.getElementById('transactionCode').value = '';
            document.getElementById('paymentNotes').value = '';
        }
        
        function printReceipt() {
            const receiptContent = document.getElementById('receiptDetails').innerHTML;
            const schoolName = document.getElementById('financeSchool').textContent;
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Payment Receipt</title>
                    <style>
                        body { font-family: Arial; padding: 40px; }
                        .header { text-align: center; margin-bottom: 30px; }
                        .school-name { color: #10b981; font-size: 24px; font-weight: bold; }
                        .receipt-box { border: 2px solid #10b981; padding: 20px; border-radius: 10px; }
                        .footer { margin-top: 40px; text-align: center; color: #666; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div class="school-name">${schoolName}</div>
                        <h2>Payment Receipt</h2>
                    </div>
                    
                    <div class="receipt-box">
                        ${receiptContent}
                    </div>
                    
                    <div class="footer">
                        <p>Thank you for your payment!</p>
                        <p>Generated on ${new Date().toLocaleString()}</p>
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
        
        function closeReceiptModal() {
            document.getElementById('receiptModal').classList.remove('active');
        }
        
        function newPayment() {
            closeReceiptModal();
            selectedStudent = null;
            document.getElementById('paymentForm').style.display = 'none';
            document.getElementById('searchInput').value = '';
            displayStudentList();
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
