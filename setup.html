<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register School - School System</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .setup-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        .setup-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .setup-header i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .setup-header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .school-type-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }
        
        .type-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }
        
        .type-card:hover {
            border-color: #667eea;
        }
        
        .type-card input[type="radio"] {
            display: none;
        }
        
        .type-card i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-card">
            <div class="setup-header">
                <i class="fas fa-school"></i>
                <h2>Register Your School</h2>
                <p>Fill in the details to get started</p>
            </div>
            
            <form id="setupForm">
                <div class="form-group">
                    <label>School Name</label>
                    <input type="text" id="schoolName" required>
                </div>
                
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" id="schoolEmail" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                
                <div class="form-group">
                    <label>School Type</label>
                    <div class="school-type-options">
                        <label class="type-card">
                            <input type="radio" name="schoolType" value="primary" checked>
                            <i class="fas fa-child"></i>
                            <h4>Primary School</h4>
                        </label>
                        
                        <label class="type-card">
                            <input type="radio" name="schoolType" value="high">
                            <i class="fas fa-user-graduate"></i>
                            <h4>High School</h4>
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Create School</button>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script src="js/firebase-config.js"></script>
    <script>
        document.getElementById('setupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const schoolName = document.getElementById('schoolName').value;
            const email = document.getElementById('schoolEmail').value;
            const password = document.getElementById('password').value;
            const schoolType = document.querySelector('input[name="schoolType"]:checked').value;
            
            const messageDiv = document.getElementById('message');
            
            if (password.length < 6) {
                messageDiv.textContent = "Password must be at least 6 characters";
                messageDiv.className = "message error";
                return;
            }
            
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                const classes = schoolType === 'primary' 
                    ? ['Grade 1', 'Grade 2', 'Grade 3', 'Grade 4', 'Grade 5', 'Grade 6', 'Grade 7', 'Grade 8']
                    : ['Form 1', 'Form 2', 'Form 3', 'Form 4'];
                
                const schoolData = {
                    name: schoolName,
                    type: schoolType,
                    classes: classes,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: user.uid
                };
                
                const schoolRef = await db.collection('schools').add(schoolData);
                
                await db.collection('users').doc(user.uid).set({
                    email: email,
                    role: 'admin',
                    schoolId: schoolRef.id,
                    name: 'Administrator',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                messageDiv.innerHTML = `✅ School created successfully! Redirecting...`;
                messageDiv.className = "message success";
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                messageDiv.textContent = error.message;
                messageDiv.className = "message error";
            }
        });
    </script>
</body>
</html>
