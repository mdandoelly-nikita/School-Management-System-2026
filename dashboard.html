<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - School System</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .nav-item.active {
            background: #667eea;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .welcome-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .welcome-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .welcome-card p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-info h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-info .number {
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 20px;
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title h2 {
            color: #333;
            font-size: 20px;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-secondary:hover {
            background: #f8f9fa;
        }
        
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .class-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .class-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .class-card.has-students {
            border-left: 5px solid #10b981;
        }
        
        .class-card.no-students {
            border-left: 5px solid #f59e0b;
            opacity: 0.9;
        }
        
        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .class-header h3 {
            color: #333;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .class-header i {
            font-size: 24px;
            color: #667eea;
        }
        
        .student-count {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        
        .count-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }
        
        .subject-list {
            margin: 15px 0;
        }
        
        .subject-list strong {
            color: #666;
            font-size: 14px;
        }
        
        .subject-tag {
            display: inline-block;
            background: #f0f4ff;
            color: #667eea;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 5px 5px 0 0;
        }
        
        .streams-preview {
            margin: 10px 0;
            font-size: 13px;
            color: #667eea;
        }
        
        .stream-tag-small {
            background: #e0e7ff;
            color: #667eea;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            display: inline-block;
            margin: 2px;
        }
        
        .empty-state-message {
            margin-top: 15px;
            padding: 12px;
            background: #fff3cd;
            color: #856404;
            border-radius: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .click-message {
            margin-top: 15px;
            color: #667eea;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-chalkboard-teacher"></i>
                <h2 id="teacherName">Teacher</h2>
                <p id="teacherSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="enter-marks.html" class="nav-item">
                    <i class="fas fa-pen"></i> Enter Marks
                </a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-tachometer-alt" style="margin-right: 10px; color: #667eea;"></i>Teacher Dashboard</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="welcome-card">
                <h2>Welcome back, <span id="welcomeName">Teacher</span>! 🎉</h2>
                <p>Manage your classes and enter student marks.</p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>My Classes</h3>
                        <div class="number" id="totalClasses">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-chalkboard"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Students</h3>
                        <div class="number" id="totalStudents">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Classes with Students</h3>
                        <div class="number" id="classesWithStudents">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
            </div>
            
            <div class="section-title">
                <h2><i class="fas fa-chalkboard" style="margin-right: 10px; color: #667eea;"></i>My Classes</h2>
                <button class="btn-secondary" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
            
            <div id="classesContainer" class="classes-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading classes...
                </div>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let teacherData = null;
        let allStreams = [];
        let allStudents = [];
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    showMessage('Teacher not found', 'error');
                    return;
                }
                
                teacherData = userDoc.data();
                
                if (teacherData.role !== 'teacher') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                document.getElementById('teacherName').textContent = teacherData.name || 'Teacher';
                document.getElementById('welcomeName').textContent = teacherData.name || 'Teacher';
                
                const schoolDoc = await db.collection('schools').doc(teacherData.schoolId).get();
                if (schoolDoc.exists) {
                    document.getElementById('teacherSchool').textContent = schoolDoc.data().name;
                }
                
                // Load all streams first
                await loadAllStreams();
                
                // Load all students
                await loadAllStudents();
                
                // Load classes with student counts
                await loadClasses();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadAllStreams() {
            try {
                const snapshot = await db.collection('streams')
                    .where('schoolId', '==', teacherData.schoolId)
                    .get();
                
                allStreams = [];
                snapshot.forEach(doc => {
                    allStreams.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                console.log('Loaded streams:', allStreams.length);
            } catch (error) {
                console.error('Error loading streams:', error);
            }
        }
        
        async function loadAllStudents() {
            try {
                const snapshot = await db.collection('students')
                    .where('schoolId', '==', teacherData.schoolId)
                    .where('status', '==', 'active')
                    .get();
                
                allStudents = [];
                snapshot.forEach(doc => {
                    allStudents.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                console.log('Loaded students:', allStudents.length);
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }
        
        async function loadClasses() {
            const container = document.getElementById('classesContainer');
            
            if (!teacherData.assignments || Object.keys(teacherData.assignments).length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px; background: white; border-radius: 12px; grid-column: 1/-1;">
                        <i class="fas fa-chalkboard" style="font-size: 60px; color: #cbd5e0;"></i>
                        <h3 style="margin: 20px 0;">No Classes Assigned</h3>
                        <p>Please contact the admin to assign you to classes.</p>
                    </div>
                `;
                document.getElementById('totalClasses').textContent = '0';
                return;
            }
            
            let html = '';
            let totalStudentsCount = 0;
            let classesWithStudentsCount = 0;
            
            // Get all assigned classes
            const assignedClasses = Object.keys(teacherData.assignments);
            document.getElementById('totalClasses').textContent = assignedClasses.length;
            
            for (const className of assignedClasses) {
                // Get the streams assigned for this class
                const assignedStreams = teacherData.assignments[className] || [];
                
                // Count students in ALL streams of this class
                let classStudentCount = 0;
                const streamStudents = [];
                
                // For each assigned stream, count students
                for (const stream of assignedStreams) {
                    const studentsInStream = allStudents.filter(s => s.studentClass === stream);
                    classStudentCount += studentsInStream.length;
                    
                    if (studentsInStream.length > 0) {
                        streamStudents.push({
                            stream: stream,
                            count: studentsInStream.length
                        });
                    }
                }
                
                totalStudentsCount += classStudentCount;
                
                if (classStudentCount > 0) {
                    classesWithStudentsCount++;
                }
                
                const cardClass = classStudentCount > 0 ? 'class-card has-students' : 'class-card no-students';
                const badgeClass = classStudentCount > 0 ? 'badge-success' : 'badge-warning';
                const badgeText = classStudentCount > 0 ? `${classStudentCount} Students` : 'No Students';
                
                // Create streams preview
                let streamsPreview = '';
                if (assignedStreams.length > 0) {
                    streamsPreview = '<div class="streams-preview">';
                    assignedStreams.forEach(stream => {
                        const hasStudents = allStudents.some(s => s.studentClass === stream);
                        streamsPreview += `<span class="stream-tag-small" style="${hasStudents ? 'background: #d1fae5;' : ''}">${stream}</span> `;
                    });
                    streamsPreview += '</div>';
                }
                
                html += `
                    <div class="${cardClass}" onclick="goToClass('${className}')">
                        <div class="class-header">
                            <h3><i class="fas fa-users"></i> ${className}</h3>
                            <i class="fas fa-chevron-right"></i>
                        </div>
                        
                        <div class="student-count">
                            <span>Students enrolled:</span>
                            <span class="count-badge ${badgeClass}">${badgeText}</span>
                        </div>
                        
                        ${streamsPreview}
                        
                        <div class="subject-list">
                            <strong>Assigned Streams (${assignedStreams.length}):</strong>
                            <div style="margin-top: 8px;">
                                ${assignedStreams.slice(0, 3).map(s => `<span class="subject-tag">${s}</span>`).join('')}
                                ${assignedStreams.length > 3 ? `<span class="subject-tag">+${assignedStreams.length - 3} more</span>` : ''}
                            </div>
                        </div>
                        
                        <div class="subject-list">
                            <strong>Subjects:</strong>
                            <div style="margin-top: 8px;">
                                ${teacherData.subjects?.map(s => `<span class="subject-tag">${s}</span>`).join('') || 'No subjects assigned'}
                            </div>
                        </div>
                        
                        ${classStudentCount === 0 ? `
                            <div class="empty-state-message">
                                <i class="fas fa-info-circle"></i> No students yet in your assigned streams.
                            </div>
                        ` : `
                            <div class="click-message">
                                <i class="fas fa-arrow-right"></i> Click to enter marks
                            </div>
                        `}
                    </div>
                `;
            }
            
            document.getElementById('totalStudents').textContent = totalStudentsCount;
            document.getElementById('classesWithStudents').textContent = classesWithStudentsCount;
            
            container.innerHTML = html;
        }
        
        function goToClass(className) {
            window.location.href = `enter-marks.html?class=${encodeURIComponent(className)}`;
        }
        
        function refreshData() {
            loadAllStudents();
            loadClasses();
            showMessage('Data refreshed', 'success');
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
