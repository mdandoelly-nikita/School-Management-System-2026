<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Applications - School System</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .nav-item.active {
            background: #667eea;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .stat-info h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-info .number {
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 20px;
        }
        
        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }
        
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            height: 42px;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            height: 42px;
        }
        
        .applications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .application-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .application-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .application-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .student-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .application-details {
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .detail-row .label {
            color: #666;
        }
        
        .detail-row .value {
            color: #333;
            font-weight: 500;
        }
        
        .application-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        
        .btn-icon {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
        }
        
        .btn-icon.approve {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .btn-icon.reject {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .btn-icon.view:hover {
            background: #667eea;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .no-data {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
            grid-column: 1/-1;
        }
        
        .no-data i {
            font-size: 60px;
            color: #cbd5e0;
            margin-bottom: 20px;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-school"></i>
                <h2 id="schoolName">Loading...</h2>
                <p id="schoolType"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="teachers.html" class="nav-item">
                    <i class="fas fa-users"></i> Teachers
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-user-graduate"></i> Students
                </a>
                <a href="parents.html" class="nav-item">
                    <i class="fas fa-family"></i> Parents
                </a>
                <a href="classes.html" class="nav-item">
                    <i class="fas fa-book"></i> Classes
                </a>
                <a href="applications.html" class="nav-item active">
                    <i class="fas fa-file-signature"></i> Applications
                </a>
                <a href="fee-structure.html" class="nav-item">
                    <i class="fas fa-coins"></i> Fee Structure
                </a>
                <a href="fee-payments.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> Payments
                </a>
                <a href="fee-reports.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Reports
                </a>
                <a href="notifications.html" class="nav-item">
                    <i class="fas fa-bell"></i> Notifications
                </a>
                <a href="student-results.html" class="nav-item">
    <i class="fas fa-chart-line"></i> Student Results
</a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-file-signature" style="margin-right: 10px; color: #667eea;"></i>Admission Applications</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Applications</h3>
                        <div class="number" id="totalApps">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-file"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Pending</h3>
                        <div class="number" id="pendingApps">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Approved</h3>
                        <div class="number" id="approvedApps">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Rejected</h3>
                        <div class="number" id="rejectedApps">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-times-circle"></i>
                    </div>
                </div>
            </div>
            
            <div class="filters">
                <div class="filter-group">
                    <label>Filter by Status</label>
                    <select id="statusFilter" onchange="loadApplications()">
                        <option value="all">All Applications</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Search by Name</label>
                    <input type="text" id="searchInput" placeholder="Enter student name...">
                </div>
                
                <button class="btn-primary" onclick="loadApplications()">
                    <i class="fas fa-search"></i> Search
                </button>
                
                <button class="btn-secondary" onclick="clearFilters()">
                    <i class="fas fa-undo"></i> Clear
                </button>
            </div>
            
            <div id="applicationsContainer" class="applications-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading applications...
                </div>
            </div>
        </div>
    </div>
    
    <!-- View Application Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Application Details</h2>
                <button class="close-btn" onclick="closeViewModal()">&times;</button>
            </div>
            
            <div id="applicationDetails">
                <!-- Will be populated dynamically -->
            </div>
            
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeViewModal()">Close</button>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let applications = [];
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'admin') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                currentSchoolId = userData.schoolId;
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                document.getElementById('schoolName').textContent = schoolDoc.data().name;
                document.getElementById('schoolType').textContent = 
                    schoolDoc.data().type === 'primary' ? 'Primary School' : 'High School';
                
                await loadApplications();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data: ' + error.message, 'error');
            }
        });
        
        async function loadApplications() {
            try {
                const container = document.getElementById('applicationsContainer');
                container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading applications...</div>';
                
                const statusFilter = document.getElementById('statusFilter').value;
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                
                console.log('Loading applications for school:', currentSchoolId);
                
                // Simple query without orderBy to avoid index issues
                let snapshot;
                
                if (statusFilter && statusFilter !== 'all') {
                    snapshot = await db.collection('applications')
                        .where('schoolId', '==', currentSchoolId)
                        .where('status', '==', statusFilter)
                        .get();
                } else {
                    snapshot = await db.collection('applications')
                        .where('schoolId', '==', currentSchoolId)
                        .get();
                }
                
                console.log('Applications found:', snapshot.size);
                
                applications = [];
                snapshot.forEach(doc => {
                    applications.push({ id: doc.id, ...doc.data() });
                });
                
                // Sort by date client-side
                applications.sort((a, b) => {
                    const dateA = a.submittedAt?.seconds || 0;
                    const dateB = b.submittedAt?.seconds || 0;
                    return dateB - dateA;
                });
                
                // Apply search filter
                if (searchTerm) {
                    applications = applications.filter(app => 
                        (app.firstName + ' ' + app.lastName).toLowerCase().includes(searchTerm)
                    );
                }
                
                updateStats();
                displayApplications();
                
            } catch (error) {
                console.error('Error loading applications:', error);
                
                // Check if collection doesn't exist
                if (error.code === 'not-found' || error.message.includes('no collection')) {
                    document.getElementById('applicationsContainer').innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-file-signature"></i>
                            <h3>No Applications Yet</h3>
                            <p>The applications collection will be created when the first application is submitted.</p>
                            <p>Share the admission form link with parents to start receiving applications.</p>
                            <div style="margin-top: 20px; padding: 15px; background: #f0f4ff; border-radius: 8px;">
                                <p><strong>Admission Form URL:</strong></p>
                                <code style="background: white; padding: 8px; border-radius: 4px; display: block; margin-top: 5px;">
                                    ${window.location.origin}/admission.html
                                </code>
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('applicationsContainer').innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Error Loading Applications</h3>
                            <p>${error.message}</p>
                        </div>
                    `;
                }
                
                // Reset stats
                document.getElementById('totalApps').textContent = '0';
                document.getElementById('pendingApps').textContent = '0';
                document.getElementById('approvedApps').textContent = '0';
                document.getElementById('rejectedApps').textContent = '0';
            }
        }
        
        function updateStats() {
            const total = applications.length;
            const pending = applications.filter(a => a.status === 'pending').length;
            const approved = applications.filter(a => a.status === 'approved').length;
            const rejected = applications.filter(a => a.status === 'rejected').length;
            
            document.getElementById('totalApps').textContent = total;
            document.getElementById('pendingApps').textContent = pending;
            document.getElementById('approvedApps').textContent = approved;
            document.getElementById('rejectedApps').textContent = rejected;
        }
        
        function displayApplications() {
            const container = document.getElementById('applicationsContainer');
            
            if (applications.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-file-signature"></i>
                        <h3>No Applications Found</h3>
                        <p>Applications will appear here when parents apply online.</p>
                        <div style="margin-top: 20px; padding: 15px; background: #f0f4ff; border-radius: 8px;">
                            <p><strong>Admission Form URL:</strong></p>
                            <code style="background: white; padding: 8px; border-radius: 4px; display: block; margin-top: 5px;">
                                ${window.location.origin}/admission.html
                            </code>
                        </div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            applications.forEach(app => {
                const date = app.submittedAt?.seconds ? 
                    new Date(app.submittedAt.seconds * 1000).toLocaleDateString() : 'N/A';
                
                let statusClass = 'status-pending';
                let statusText = app.status || 'pending';
                
                if (app.status === 'approved') statusClass = 'status-approved';
                if (app.status === 'rejected') statusClass = 'status-rejected';
                
                html += `
                    <div class="application-card">
                        <div class="application-header">
                            <span class="student-name">${app.firstName || ''} ${app.lastName || ''}</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        
                        <div class="application-details">
                            <div class="detail-row">
                                <span class="label">Class:</span>
                                <span class="value">${app.applyingClass || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Parent:</span>
                                <span class="value">${app.parentName || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Phone:</span>
                                <span class="value">${app.parentPhone || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Email:</span>
                                <span class="value">${app.parentEmail || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Submitted:</span>
                                <span class="value">${date}</span>
                            </div>
                        </div>
                        
                        <div class="application-actions">
                            <button class="btn-icon view" onclick="viewApplication('${app.id}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                            ${app.status === 'pending' ? `
                                <button class="btn-icon approve" onclick="approveApplication('${app.id}')">
                                    <i class="fas fa-check"></i> Approve
                                </button>
                                <button class="btn-icon reject" onclick="rejectApplication('${app.id}')">
                                    <i class="fas fa-times"></i> Reject
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function clearFilters() {
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            loadApplications();
        }
        
        function viewApplication(appId) {
            const app = applications.find(a => a.id === appId);
            if (!app) return;
            
            const date = app.submittedAt?.seconds ? 
                new Date(app.submittedAt.seconds * 1000).toLocaleString() : 'N/A';
            
            const detailsHtml = `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: #333; margin-bottom: 15px;">Student Information</h3>
                    <p><strong>Name:</strong> ${app.firstName || ''} ${app.lastName || ''}</p>
                    <p><strong>Date of Birth:</strong> ${app.dob || 'N/A'}</p>
                    <p><strong>Gender:</strong> ${app.gender || 'N/A'}</p>
                    <p><strong>Applying for:</strong> ${app.applyingClass || 'N/A'}</p>
                    <p><strong>Previous School:</strong> ${app.previousSchool || 'N/A'}</p>
                    
                    <h3 style="color: #333; margin: 20px 0 15px;">Parent Information</h3>
                    <p><strong>Name:</strong> ${app.parentName || 'N/A'}</p>
                    <p><strong>Phone:</strong> ${app.parentPhone || 'N/A'}</p>
                    <p><strong>Email:</strong> ${app.parentEmail || 'N/A'}</p>
                    <p><strong>ID/Passport:</strong> ${app.parentId || 'N/A'}</p>
                    
                    <h3 style="color: #333; margin: 20px 0 15px;">Additional Information</h3>
                    <p><strong>Address:</strong> ${app.address || 'N/A'}</p>
                    <p><strong>Medical Info:</strong> ${app.medicalInfo || 'None'}</p>
                    
                    <p><strong>Submitted:</strong> ${date}</p>
                    <p><strong>Status:</strong> <span style="text-transform: capitalize;">${app.status || 'pending'}</span></p>
                </div>
            `;
            
            document.getElementById('applicationDetails').innerHTML = detailsHtml;
            document.getElementById('viewModal').classList.add('active');
        }
        
        async function approveApplication(appId) {
            if (!confirm('Approve this application? This will create a student account.')) return;
            
            try {
                const app = applications.find(a => a.id === appId);
                
                // Update application status
                await db.collection('applications').doc(appId).update({
                    status: 'approved',
                    reviewedBy: currentUser.uid,
                    reviewedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Generate admission number
                const year = new Date().getFullYear().toString().slice(-2);
                const randomNum = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                const admissionNumber = `ADM${year}${randomNum}`;
                
                // Create student record
                const studentData = {
                    firstName: app.firstName,
                    lastName: app.lastName,
                    name: `${app.firstName} ${app.lastName}`,
                    dob: app.dob,
                    gender: app.gender,
                    admissionNumber: admissionNumber,
                    studentClass: app.applyingClass,
                    parentPhone: app.parentPhone,
                    parentEmail: app.parentEmail,
                    address: app.address,
                    medicalInfo: app.medicalInfo,
                    schoolId: app.schoolId || currentSchoolId,
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                await db.collection('students').add(studentData);
                
                showMessage('Application approved and student created!', 'success');
                await loadApplications();
                
            } catch (error) {
                console.error('Error approving application:', error);
                showMessage('Error approving application: ' + error.message, 'error');
            }
        }
        
        async function rejectApplication(appId) {
            if (!confirm('Reject this application?')) return;
            
            try {
                await db.collection('applications').doc(appId).update({
                    status: 'rejected',
                    reviewedBy: currentUser.uid,
                    reviewedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showMessage('Application rejected', 'success');
                await loadApplications();
                
            } catch (error) {
                console.error('Error rejecting application:', error);
                showMessage('Error rejecting application', 'error');
            }
        }
        
        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
