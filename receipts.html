<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Receipts - Finance Portal</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #10b981;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #d1fae5;
            color: #10b981;
        }
        
        .nav-item.active {
            background: #10b981;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }
        
        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #10b981;
        }
        
        .btn-primary {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #059669;
        }
        
        .receipts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .receipt-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .receipt-card:hover {
            border-color: #10b981;
            transform: translateY(-2px);
        }
        
        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #d1fae5;
        }
        
        .receipt-header h3 {
            color: #333;
            font-size: 16px;
        }
        
        .receipt-badge {
            background: #d1fae5;
            color: #065f46;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .receipt-details {
            margin: 15px 0;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .detail-row .label {
            color: #666;
        }
        
        .detail-row .value {
            color: #333;
            font-weight: 500;
        }
        
        .receipt-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        
        .btn-icon {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
            text-decoration: none;
        }
        
        .btn-icon:hover {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .btn-icon.print:hover {
            background: #10b981;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .receipt-preview {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .pagination {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
        }
        
        .pagination button {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .pagination button:hover {
            background: #10b981;
            color: white;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-coins"></i>
                <h2 id="financeName">Finance Officer</h2>
                <p id="financeSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-users"></i> Students Fees
                </a>
                <a href="record-payment.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> Record Payment
                </a>
                <a href="receipts.html" class="nav-item active">
                    <i class="fas fa-receipt"></i> Receipts
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Reports
                </a>
                <a href="add-student-fee.html" class="nav-item">
                    <i class="fas fa-plus-circle"></i> Add Student Fee
                </a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-receipt" style="margin-right: 10px; color: #10b981;"></i>Payment Receipts</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="filters">
                <div class="filter-group">
                    <label>Search</label>
                    <input type="text" id="searchInput" placeholder="Student name or receipt...">
                </div>
                
                <div class="filter-group">
                    <label>Date From</label>
                    <input type="date" id="dateFrom">
                </div>
                
                <div class="filter-group">
                    <label>Date To</label>
                    <input type="date" id="dateTo">
                </div>
                
                <button class="btn-primary" onclick="applyFilters()">
                    <i class="fas fa-filter"></i> Apply
                </button>
                
                <button class="btn-primary" onclick="exportReceipts()">
                    <i class="fas fa-file-excel"></i> Export
                </button>
            </div>
            
            <div id="receiptsContainer" class="receipts-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading receipts...
                </div>
            </div>
            
            <div class="pagination" id="pagination">
                <button onclick="prevPage()" id="prevBtn" disabled>Previous</button>
                <span id="pageInfo">Page 1 of 1</span>
                <button onclick="nextPage()" id="nextBtn" disabled>Next</button>
            </div>
        </div>
    </div>
    
    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-receipt"></i> Receipt Details</h2>
                <button class="close-btn" onclick="closeReceiptModal()">&times;</button>
            </div>
            
            <div id="receiptPreview" class="receipt-preview">
                <!-- Receipt details will be inserted here -->
            </div>
            
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeReceiptModal()">Close</button>
                <button class="btn-primary" onclick="printCurrentReceipt()">
                    <i class="fas fa-print"></i> Print
                </button>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let payments = [];
        let filteredPayments = [];
        let currentPage = 1;
        const itemsPerPage = 12;
        let currentReceipt = null;
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'finance' && userData.role !== 'admin') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                currentSchoolId = userData.schoolId;
                
                document.getElementById('financeName').textContent = userData.name || 'Finance Officer';
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                document.getElementById('financeSchool').textContent = schoolDoc.data().name;
                
                await loadReceipts();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadReceipts() {
            const snapshot = await db.collection('payments')
                .where('schoolId', '==', currentSchoolId)
                .orderBy('date', 'desc')
                .get();
            
            payments = [];
            snapshot.forEach(doc => {
                payments.push({ id: doc.id, ...doc.data() });
            });
            
            filteredPayments = [...payments];
            displayReceipts();
        }
        
        function displayReceipts() {
            const container = document.getElementById('receiptsContainer');
            
            if (filteredPayments.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px; background: white; border-radius: 12px; grid-column: 1/-1;">
                        <i class="fas fa-receipt" style="font-size: 60px; color: #cbd5e0;"></i>
                        <h3 style="margin: 20px 0;">No Receipts Found</h3>
                        <p>Record payments to generate receipts.</p>
                    </div>
                `;
                document.getElementById('pagination').style.display = 'none';
                return;
            }
            
            document.getElementById('pagination').style.display = 'flex';
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageReceipts = filteredPayments.slice(start, end);
            
            const totalPages = Math.ceil(filteredPayments.length / itemsPerPage);
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            
            let html = '';
            pageReceipts.forEach(p => {
                const date = p.date?.seconds ? new Date(p.date.seconds * 1000).toLocaleDateString() : 'N/A';
                const receiptNo = p.id.slice(-8).toUpperCase();
                
                html += `
                    <div class="receipt-card">
                        <div class="receipt-header">
                            <h3><i class="fas fa-receipt"></i> Receipt #${receiptNo}</h3>
                            <span class="receipt-badge">${date}</span>
                        </div>
                        
                        <div class="receipt-details">
                            <div class="detail-row">
                                <span class="label">Student:</span>
                                <span class="value">${p.studentName || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Admission:</span>
                                <span class="value">${p.admissionNumber || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Amount:</span>
                                <span class="value" style="color: #10b981;">KES ${(p.amount || 0).toLocaleString()}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Method:</span>
                                <span class="value">${p.method || 'Cash'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Transaction:</span>
                                <span class="value">${p.transactionCode || 'N/A'}</span>
                            </div>
                        </div>
                        
                        <div class="receipt-actions">
                            <button class="btn-icon" onclick="viewReceipt('${p.id}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                            <button class="btn-icon print" onclick="printReceipt('${p.id}')">
                                <i class="fas fa-print"></i> Print
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function viewReceipt(receiptId) {
            const receipt = payments.find(p => p.id === receiptId);
            if (!receipt) return;
            
            currentReceipt = receipt;
            
            const date = receipt.date?.seconds ? new Date(receipt.date.seconds * 1000).toLocaleDateString() : 'N/A';
            const receiptNo = receipt.id.slice(-8).toUpperCase();
            
            const receiptHtml = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <h3 style="color: #10b981;">PAYMENT RECEIPT</h3>
                    <p>Receipt #: ${receiptNo}</p>
                    <p>Date: ${date}</p>
                </div>
                <hr>
                <p><strong>Student:</strong> ${receipt.studentName || 'N/A'}</p>
                <p><strong>Admission:</strong> ${receipt.admissionNumber || 'N/A'}</p>
                <p><strong>Class:</strong> ${receipt.className || 'N/A'}</p>
                <hr>
                <p><strong>Amount:</strong> KES ${(receipt.amount || 0).toLocaleString()}</p>
                <p><strong>Payment Method:</strong> ${receipt.method || 'Cash'}</p>
                <p><strong>Transaction Code:</strong> ${receipt.transactionCode || 'N/A'}</p>
                <hr>
                <p style="text-align: center; color: #666;">Thank you for your payment!</p>
            `;
            
            document.getElementById('receiptPreview').innerHTML = receiptHtml;
            document.getElementById('receiptModal').classList.add('active');
        }
        
        function printReceipt(receiptId) {
            const receipt = payments.find(p => p.id === receiptId);
            if (!receipt) return;
            
            const date = receipt.date?.seconds ? new Date(receipt.date.seconds * 1000).toLocaleDateString() : 'N/A';
            const receiptNo = receipt.id.slice(-8).toUpperCase();
            const schoolName = document.getElementById('financeSchool').textContent;
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Payment Receipt</title>
                    <style>
                        body { font-family: Arial; padding: 40px; }
                        .header { text-align: center; margin-bottom: 30px; }
                        .school-name { color: #10b981; font-size: 24px; font-weight: bold; }
                        .receipt-box { border: 2px solid #10b981; padding: 20px; border-radius: 10px; }
                        .footer { margin-top: 40px; text-align: center; color: #666; }
                        table { width: 100%; }
                        td { padding: 8px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div class="school-name">${schoolName}</div>
                        <h2>Payment Receipt</h2>
                        <p>Receipt #: ${receiptNo}</p>
                        <p>Date: ${date}</p>
                    </div>
                    
                    <div class="receipt-box">
                        <table>
                            <tr><td><strong>Student:</strong></td><td>${receipt.studentName || 'N/A'}</td></tr>
                            <tr><td><strong>Admission:</strong></td><td>${receipt.admissionNumber || 'N/A'}</td></tr>
                            <tr><td><strong>Class:</strong></td><td>${receipt.className || 'N/A'}</td></tr>
                            <tr><td colspan="2"><hr></td></tr>
                            <tr><td><strong>Amount:</strong></td><td>KES ${(receipt.amount || 0).toLocaleString()}</td></tr>
                            <tr><td><strong>Payment Method:</strong></td><td>${receipt.method || 'Cash'}</td></tr>
                            <tr><td><strong>Transaction Code:</strong></td><td>${receipt.transactionCode || 'N/A'}</td></tr>
                        </table>
                    </div>
                    
                    <div class="footer">
                        <p>Thank you for your payment!</p>
                        <p>Generated on ${new Date().toLocaleString()}</p>
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
        
        function printCurrentReceipt() {
            if (currentReceipt) {
                printReceipt(currentReceipt.id);
            }
        }
        
        function closeReceiptModal() {
            document.getElementById('receiptModal').classList.remove('active');
        }
        
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            
            filteredPayments = payments.filter(p => {
                let match = true;
                
                if (searchTerm) {
                    const studentMatch = p.studentName?.toLowerCase().includes(searchTerm);
                    const receiptMatch = p.id.toLowerCase().includes(searchTerm);
                    match = match && (studentMatch || receiptMatch);
                }
                
                if (dateFrom && p.date?.seconds) {
                    const paymentDate = new Date(p.date.seconds * 1000);
                    const fromDate = new Date(dateFrom);
                    match = match && paymentDate >= fromDate;
                }
                
                if (dateTo && p.date?.seconds) {
                    const paymentDate = new Date(p.date.seconds * 1000);
                    const toDate = new Date(dateTo);
                    toDate.setHours(23, 59, 59);
                    match = match && paymentDate <= toDate;
                }
                
                return match;
            });
            
            currentPage = 1;
            displayReceipts();
        }
        
        function exportReceipts() {
            let csv = 'Receipt No,Date,Student,Admission,Class,Amount,Method,Transaction\n';
            
            filteredPayments.forEach(p => {
                const date = p.date?.seconds ? new Date(p.date.seconds * 1000).toLocaleDateString() : 'N/A';
                const receiptNo = p.id.slice(-8).toUpperCase();
                
                csv += `"${receiptNo}","${date}","${p.studentName || 'N/A'}","${p.admissionNumber || 'N/A'}","${p.className || 'N/A'}",${p.amount || 0},"${p.method || 'N/A'}","${p.transactionCode || 'N/A'}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `receipts_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            
            showMessage('Receipts exported successfully!', 'success');
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                displayReceipts();
            }
        }
        
        function nextPage() {
            const totalPages = Math.ceil(filteredPayments.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                displayReceipts();
            }
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
