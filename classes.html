<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Management - School System</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #4f46e5;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #eef2ff;
            color: #4f46e5;
        }
        
        .nav-item.active {
            background: #4f46e5;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #4338ca;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .class-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 2px solid #e0e0e0;
        }
        
        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2ff;
        }
        
        .class-header h3 {
            color: #333;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .class-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-icon {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            color: #666;
            font-size: 12px;
        }
        
        .btn-icon:hover {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        
        .btn-icon.delete:hover {
            background: #ef4444;
            border-color: #ef4444;
        }
        
        .streams-list {
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .stream-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .stream-item:last-child {
            border-bottom: none;
        }
        
        .add-stream {
            margin-top: 10px;
            padding: 10px;
            background: #eef2ff;
            border: 2px dashed #4f46e5;
            border-radius: 8px;
            text-align: center;
            color: #4f46e5;
            cursor: pointer;
            font-size: 14px;
        }
        
        .add-stream:hover {
            background: #4f46e5;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            padding: 30px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4f46e5;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-school"></i>
                <h2 id="schoolName">Loading...</h2>
                <p id="schoolType"></p>
            </div>
         <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
        <i class="fas fa-tachometer-alt"></i> Dashboard

        <i class="fas fa-chalkboard-teacher"></i> Class Teachers

    <a href="finance-officers.html" class="nav-item">
        <i class="fas fa-coins"></i> Finance Officers

    <a href="fee-structure.html" class="nav-item">
        <i class="fas fa-coins"></i> Fee Structure

    <a href="fee-payments.html" class="nav-item">
        <i class="fas fa-credit-card"></i> Payments

    <a href="fee-reports.html" class="nav-item">

    <a href="notifications.html" class="nav-item">

    <a href="approve-applications.html" class="nav-item">

        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-book" style="margin-right: 10px; color: #4f46e5;"></i>Class Management</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="action-bar">
                <h2>Classes & Streams</h2>
                <button class="btn-primary" onclick="openAddClassModal()">
                    <i class="fas fa-plus"></i> Add Class
                </button>
            </div>
            
            <div id="classesContainer" class="classes-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading classes...
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Class Modal -->
    <div id="classModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="classModalTitle">Add Class</h2>
                <button class="close-btn" onclick="closeClassModal()">&times;</button>
            </div>
            
            <form id="classForm">
                <input type="hidden" id="classId">
                
                <div class="form-group">
                    <label>Class Name</label>
                    <input type="text" id="className" placeholder="e.g., Form 1, Grade 1, Form 5" required>
                </div>
                
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <input type="text" id="classDescription" placeholder="e.g., Junior Secondary">
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeClassModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="classSaveBtn">Save Class</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Add/Edit Stream Modal -->
    <div id="streamModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="streamModalTitle">Add Stream</h2>
                <button class="close-btn" onclick="closeStreamModal()">&times;</button>
            </div>
            
            <form id="streamForm">
                <input type="hidden" id="streamId">
                <input type="hidden" id="streamClassId">
                
                <div class="form-group">
                    <label>Stream Name</label>
                    <input type="text" id="streamName" placeholder="e.g., West, East, North" required>
                </div>
                
                <div class="form-group">
                    <label>Capacity (Optional)</label>
                    <input type="number" id="streamCapacity" placeholder="e.g., 45">
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeStreamModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="streamSaveBtn">Save Stream</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Message Toast -->
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let classes = [];
        let streams = [];
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                currentSchoolId = userData.schoolId;
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                document.getElementById('schoolName').textContent = schoolDoc.data().name;
                document.getElementById('schoolType').textContent = 
                    schoolDoc.data().type === 'primary' ? 'Primary' : 'High School';
                
                await loadData();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadData() {
            // Load classes
            const classesSnap = await db.collection('classes')
                .where('schoolId', '==', currentSchoolId)
                .get();
            
            classes = [];
            classesSnap.forEach(doc => {
                classes.push({ id: doc.id, ...doc.data() });
            });
            
            // Load streams
            const streamsSnap = await db.collection('streams')
                .where('schoolId', '==', currentSchoolId)
                .get();
            
            streams = [];
            streamsSnap.forEach(doc => {
                streams.push({ id: doc.id, ...doc.data() });
            });
            
            displayClasses();
        }
        
        function displayClasses() {
            const container = document.getElementById('classesContainer');
            
            if (classes.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px; background: white; border-radius: 12px; grid-column: 1/-1;">
                        <i class="fas fa-school" style="font-size: 60px; color: #cbd5e0;"></i>
                        <h3 style="margin: 20px 0;">No Classes Yet</h3>
                        <p>Click "Add Class" to create your first class.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            classes.forEach(cls => {
                const classStreams = streams.filter(s => s.classId === cls.id);
                
                let streamsHtml = '';
                if (classStreams.length > 0) {
                    classStreams.forEach(stream => {
                        streamsHtml += `
                            <div class="stream-item">
                                <span><i class="fas fa-layer-group" style="color: #4f46e5;"></i> ${stream.name} ${stream.capacity ? `(Cap: ${stream.capacity})` : ''}</span>
                                <div>
                                    <button class="btn-icon" onclick="editStream('${stream.id}')"><i class="fas fa-edit"></i></button>
                                    <button class="btn-icon delete" onclick="deleteStream('${stream.id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += `
                    <div class="class-card">
                        <div class="class-header">
                            <h3><i class="fas fa-users"></i> ${cls.name}</h3>
                            <div class="class-actions">
                                <button class="btn-icon" onclick="editClass('${cls.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon delete" onclick="deleteClass('${cls.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        
                        ${cls.description ? `<p style="color: #666; margin-bottom: 10px;">${cls.description}</p>` : ''}
                        
                        <div class="streams-list">
                            ${streamsHtml || '<p style="color: #999; text-align: center;">No streams yet</p>'}
                        </div>
                        
                        <div class="add-stream" onclick="openAddStreamModal('${cls.id}')">
                            <i class="fas fa-plus"></i> Add Stream to ${cls.name}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Class Functions
        document.getElementById('classForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const classId = document.getElementById('classId').value;
            const data = {
                schoolId: currentSchoolId,
                name: document.getElementById('className').value,
                description: document.getElementById('classDescription').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                if (classId) {
                    await db.collection('classes').doc(classId).update(data);
                    showMessage('Class updated!', 'success');
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('classes').add(data);
                    showMessage('Class added!', 'success');
                }
                
                closeClassModal();
                await loadData();
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });
        
        function openAddClassModal() {
            document.getElementById('classModalTitle').textContent = 'Add Class';
            document.getElementById('classId').value = '';
            document.getElementById('className').value = '';
            document.getElementById('classDescription').value = '';
            document.getElementById('classSaveBtn').textContent = 'Save Class';
            document.getElementById('classModal').classList.add('active');
        }
        
        async function editClass(id) {
            const cls = classes.find(c => c.id === id);
            if (!cls) return;
            
            document.getElementById('classModalTitle').textContent = 'Edit Class';
            document.getElementById('classId').value = id;
            document.getElementById('className').value = cls.name || '';
            document.getElementById('classDescription').value = cls.description || '';
            document.getElementById('classSaveBtn').textContent = 'Update Class';
            document.getElementById('classModal').classList.add('active');
        }
        
        function closeClassModal() {
            document.getElementById('classModal').classList.remove('active');
        }
        
        async function deleteClass(id) {
            if (!confirm('Delete this class?')) return;
            
            try {
                await db.collection('classes').doc(id).delete();
                showMessage('Class deleted', 'success');
                await loadData();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }
        
        // Stream Functions
        document.getElementById('streamForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const streamId = document.getElementById('streamId').value;
            const classId = document.getElementById('streamClassId').value;
            const cls = classes.find(c => c.id === classId);
            
            const data = {
                schoolId: currentSchoolId,
                classId: classId,
                className: cls ? cls.name : '',
                name: document.getElementById('streamName').value,
                capacity: document.getElementById('streamCapacity').value || null,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                if (streamId) {
                    await db.collection('streams').doc(streamId).update(data);
                    showMessage('Stream updated!', 'success');
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('streams').add(data);
                    showMessage('Stream added!', 'success');
                }
                
                closeStreamModal();
                await loadData();
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });
        
        function openAddStreamModal(classId) {
            document.getElementById('streamModalTitle').textContent = 'Add Stream';
            document.getElementById('streamId').value = '';
            document.getElementById('streamClassId').value = classId;
            document.getElementById('streamName').value = '';
            document.getElementById('streamCapacity').value = '';
            document.getElementById('streamSaveBtn').textContent = 'Save Stream';
            document.getElementById('streamModal').classList.add('active');
        }
        
        async function editStream(id) {
            const stream = streams.find(s => s.id === id);
            if (!stream) return;
            
            document.getElementById('streamModalTitle').textContent = 'Edit Stream';
            document.getElementById('streamId').value = id;
            document.getElementById('streamClassId').value = stream.classId;
            document.getElementById('streamName').value = stream.name || '';
            document.getElementById('streamCapacity').value = stream.capacity || '';
            document.getElementById('streamSaveBtn').textContent = 'Update Stream';
            document.getElementById('streamModal').classList.add('active');
        }
        
        function closeStreamModal() {
            document.getElementById('streamModal').classList.remove('active');
        }
        
        async function deleteStream(id) {
            if (!confirm('Delete this stream?')) return;
            
            try {
                await db.collection('streams').doc(id).delete();
                showMessage('Stream deleted', 'success');
                await loadData();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
