<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student Fee - Finance Portal</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #10b981;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #d1fae5;
            color: #10b981;
        }
        
        .nav-item.active {
            background: #10b981;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 8px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .back-button:hover {
            border-color: #10b981;
            color: #10b981;
        }
        
        .form-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-container h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #10b981;
        }
        
        .student-search {
            margin-bottom: 20px;
        }
        
        .student-search input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .student-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .student-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .student-item:hover {
            background: #d1fae5;
        }
        
        .student-item.selected {
            background: #10b981;
            color: white;
        }
        
        .student-item h4 {
            margin-bottom: 5px;
        }
        
        .student-item p {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .selected-student {
            background: #d1fae5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .selected-student h3 {
            color: #065f46;
        }
        
        .btn-primary {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #059669;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .fee-preview {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-coins"></i>
                <h2 id="financeName">Finance Officer</h2>
                <p id="financeSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-users"></i> Students Fees
                </a>
                <a href="add-student-fee.html" class="nav-item active">
                    <i class="fas fa-plus-circle"></i> Add Student Fee
                </a>
                <a href="record-payment.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> Record Payment
                </a>
                <a href="receipts.html" class="nav-item">
                    <i class="fas fa-receipt"></i> Receipts
                </a>
                <a href="reports.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Reports
                </a>
                <a href="add-student-fee.html" class="nav-item">
    <i class="fas fa-plus-circle"></i> Add Student Fee
</a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-plus-circle" style="margin-right: 10px; color: #10b981;"></i>Add Individual Student Fee</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <a href="students.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Students List
            </a>
            
            <div class="form-container">
                <h2><i class="fas fa-user-graduate"></i> Select Student</h2>
                
                <div class="student-search">
                    <input type="text" id="searchInput" placeholder="Search by name or admission...">
                </div>
                
                <div id="studentList" class="student-list">
                    <div class="loading">Loading students...</div>
                </div>
                
                <div id="selectedStudentInfo" class="selected-student" style="display: none;">
                    <!-- Will be filled dynamically -->
                </div>
                
                <form id="feeForm" style="display: none;">
                    <h2 style="margin: 20px 0;"><i class="fas fa-receipt"></i> Fee Details</h2>
                    
                    <div class="form-group">
                        <label>Fee Type</label>
                        <select id="feeType" required>
                            <option value="">Select Fee Type</option>
                            <option value="exam">Exam Fee</option>
                            <option value="activity">Activity Fee</option>
                            <option value="sports">Sports Fee</option>
                            <option value="library">Library Fee</option>
                            <option value="uniform">Uniform Fee</option>
                            <option value="transport">Transport Fee</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Amount (KES)</label>
                        <input type="number" id="feeAmount" min="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="feeDescription" rows="2" placeholder="e.g., End of Term Exams, Science Congress, etc."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Due Date (Optional)</label>
                        <input type="date" id="dueDate">
                    </div>
                    
                    <div class="fee-preview" id="feePreview">
                        <!-- Preview will show here -->
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Add Fee to Student
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let students = [];
        let selectedStudent = null;
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'finance' && userData.role !== 'admin') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                currentSchoolId = userData.schoolId;
                
                document.getElementById('financeName').textContent = userData.name || 'Finance Officer';
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                document.getElementById('financeSchool').textContent = schoolDoc.data().name;
                
                await loadStudents();
                
                // Check if student ID is in URL
                const urlParams = new URLSearchParams(window.location.search);
                const studentId = urlParams.get('student');
                if (studentId) {
                    selectStudentById(studentId);
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadStudents() {
            const snapshot = await db.collection('students')
                .where('schoolId', '==', currentSchoolId)
                .where('status', '==', 'active')
                .get();
            
            students = [];
            snapshot.forEach(doc => {
                students.push({ id: doc.id, ...doc.data() });
            });
            
            displayStudentList(students);
        }
        
        function displayStudentList(studentsToShow) {
            const container = document.getElementById('studentList');
            
            if (studentsToShow.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 30px;">No students found</div>';
                return;
            }
            
            let html = '';
            studentsToShow.forEach(student => {
                const name = student.name || `${student.firstName || ''} ${student.lastName || ''}`.trim() || 'Unknown';
                html += `
                    <div class="student-item" onclick="selectStudent('${student.id}')">
                        <h4>${name}</h4>
                        <p>${student.admissionNumber || 'N/A'} | ${student.studentClass || 'N/A'}</p>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = students.filter(s => {
                const name = (s.name || `${s.firstName || ''} ${s.lastName || ''}`).toLowerCase();
                const admission = (s.admissionNumber || '').toLowerCase();
                return name.includes(searchTerm) || admission.includes(searchTerm);
            });
            displayStudentList(filtered);
        });
        
        function selectStudent(studentId) {
            const student = students.find(s => s.id === studentId);
            if (!student) return;
            
            selectedStudent = student;
            
            // Highlight selected student
            document.querySelectorAll('.student-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            const selectedItem = Array.from(document.querySelectorAll('.student-item')).find(
                item => item.querySelector('h4')?.textContent.includes(student.name || student.firstName)
            );
            
            if (selectedItem) {
                selectedItem.classList.add('selected');
            }
            
            const studentName = student.name || `${student.firstName || ''} ${student.lastName || ''}`.trim();
            
            document.getElementById('selectedStudentInfo').innerHTML = `
                <div>
                    <h3>${studentName}</h3>
                    <p>${student.admissionNumber || 'N/A'} | ${student.studentClass || 'N/A'}</p>
                </div>
                <button class="btn-secondary" onclick="changeStudent()">Change</button>
            `;
            
            document.getElementById('selectedStudentInfo').style.display = 'flex';
            document.getElementById('feeForm').style.display = 'block';
            document.getElementById('studentList').style.display = 'none';
            document.getElementById('searchInput').style.display = 'none';
        }
        
        function selectStudentById(studentId) {
            const student = students.find(s => s.id === studentId);
            if (student) {
                selectStudent(studentId);
            }
        }
        
        function changeStudent() {
            selectedStudent = null;
            document.getElementById('selectedStudentInfo').style.display = 'none';
            document.getElementById('feeForm').style.display = 'none';
            document.getElementById('studentList').style.display = 'block';
            document.getElementById('searchInput').style.display = 'block';
            document.getElementById('feeForm').reset();
        }
        
        document.getElementById('feeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!selectedStudent) {
                showMessage('Please select a student', 'error');
                return;
            }
            
            const feeType = document.getElementById('feeType').value;
            const amount = parseInt(document.getElementById('feeAmount').value);
            const description = document.getElementById('feeDescription').value;
            const dueDate = document.getElementById('dueDate').value;
            
            if (!feeType || !amount) {
                showMessage('Please fill all required fields', 'error');
                return;
            }
            
            try {
                const feeData = {
                    schoolId: currentSchoolId,
                    studentId: selectedStudent.id,
                    studentName: selectedStudent.name || `${selectedStudent.firstName || ''} ${selectedStudent.lastName || ''}`.trim(),
                    admissionNumber: selectedStudent.admissionNumber,
                    className: selectedStudent.studentClass,
                    feeType: feeType,
                    amount: amount,
                    description: description || `${feeType} fee added`,
                    dueDate: dueDate ? firebase.firestore.Timestamp.fromDate(new Date(dueDate)) : null,
                    status: 'active',
                    createdBy: currentUser.uid,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                await db.collection('studentFees').add(feeData);
                
                showMessage(`Fee of KES ${amount} added to ${selectedStudent.name || 'student'} successfully!`, 'success');
                
                // Reset form but keep student selected
                document.getElementById('feeType').value = '';
                document.getElementById('feeAmount').value = '';
                document.getElementById('feeDescription').value = '';
                document.getElementById('dueDate').value = '';
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error adding fee: ' + error.message, 'error');
            }
        });
        
        // Preview updates
        document.getElementById('feeType').addEventListener('change', updatePreview);
        document.getElementById('feeAmount').addEventListener('input', updatePreview);
        
        function updatePreview() {
            const feeType = document.getElementById('feeType').value;
            const amount = document.getElementById('feeAmount').value;
            
            if (feeType && amount) {
                const typeLabels = {
                    'exam': 'Exam Fee',
                    'activity': 'Activity Fee',
                    'sports': 'Sports Fee',
                    'library': 'Library Fee',
                    'uniform': 'Uniform Fee',
                    'transport': 'Transport Fee',
                    'other': 'Additional Fee'
                };
                
                document.getElementById('feePreview').innerHTML = `
                    <h4>Fee Summary:</h4>
                    <p><strong>Type:</strong> ${typeLabels[feeType] || feeType}</p>
                    <p><strong>Amount:</strong> KES ${parseInt(amount).toLocaleString()}</p>
                    <p><strong>Student:</strong> ${selectedStudent?.name || ''}</p>
                `;
            } else {
                document.getElementById('feePreview').innerHTML = '';
            }
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
