<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers Management - School System</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .nav-item.active {
            background: #667eea;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .stat-info h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-info .number {
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 20px;
        }
        
        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 25px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .teacher-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .teacher-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .teacher-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .teacher-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        
        .teacher-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .teacher-info p {
            color: #666;
            font-size: 14px;
        }
        
        .teacher-details {
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .detail-item .label {
            color: #666;
        }
        
        .detail-item .value {
            color: #333;
            font-weight: 500;
        }
        
        .assigned-classes {
            margin: 15px 0;
        }
        
        .class-group {
            margin-bottom: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        
        .class-name {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stream-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .stream-tag {
            background: #e0e7ff;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
        }
        
        .teacher-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        
        .btn-icon {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
        }
        
        .btn-icon:hover {
            background: #f3f4f6;
        }
        
        .btn-icon.edit:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .btn-icon.delete:hover {
            background: #fee2e2;
            color: #ef4444;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f4ff;
        }
        
        .modal-header h2 {
            color: #333;
            font-size: 24px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .assignments-section {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .assignments-section h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .class-assignment {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        .class-assignment h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .stream-checkboxes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        
        .stream-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: #555;
        }
        
        .stream-checkbox input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
        
        .no-streams {
            color: #999;
            font-style: italic;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-school"></i>
                <h2 id="schoolName">Loading...</h2>
                <p id="schoolType"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="teachers.html" class="nav-item active">
                    <i class="fas fa-users"></i> Teachers
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-user-graduate"></i> Students
                </a>
                <a href="parents.html" class="nav-item">
                    <i class="fas fa-family"></i> Parents
                </a>
                <a href="classes.html" class="nav-item">
                    <i class="fas fa-book"></i> Classes
                </a>
                <a href="fee-structure.html" class="nav-item">
                    <i class="fas fa-coins"></i> Fee Structure
                </a>
                <a href="fee-payments.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> Payments
                </a>
                <a href="fee-reports.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Reports
                </a>
                <a href="notifications.html" class="nav-item">
                    <i class="fas fa-bell"></i> Notifications
                </a>
                <a href="student-results.html" class="nav-item">
    <i class="fas fa-chart-line"></i> Student Results
</a>
            </nav>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-users" style="margin-right: 10px; color: #667eea;"></i>Teachers Management</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Teachers</h3>
                        <div class="number" id="totalTeachers">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Classes</h3>
                        <div class="number" id="totalClasses">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-school"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Streams</h3>
                        <div class="number" id="totalStreams">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                </div>
            </div>
            
            <!-- Action Bar -->
            <div class="action-bar">
                <button class="btn-primary" onclick="openAddTeacherModal()">
                    <i class="fas fa-plus"></i> Add New Teacher
                </button>
            </div>
            
            <!-- Teachers Grid -->
            <div id="teachersContainer" class="teachers-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading teachers...
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Teacher Modal -->
    <div id="teacherModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Teacher</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="teacherForm">
                <input type="hidden" id="teacherId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="teacherName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="teacherEmail" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="teacherPhone" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Employee ID</label>
                        <input type="text" id="employeeId" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Subjects (comma separated)</label>
                    <input type="text" id="subjects" placeholder="e.g., Math, English, Science">
                </div>
                
                <div class="form-group">
                    <label>Qualification</label>
                    <input type="text" id="qualification" placeholder="e.g., Bachelor of Education">
                </div>
                
                <!-- Dynamic Class & Stream Assignments -->
                <div class="assignments-section">
                    <h3><i class="fas fa-chalkboard"></i> Class & Stream Assignments</h3>
                    <div id="assignmentsContainer">
                        <!-- Will be populated dynamically -->
                        <div class="loading">Loading classes and streams...</div>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveTeacherBtn">Save Teacher</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Message Toast -->
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchool = null;
        let currentSchoolId = null;
        let editingTeacherId = null;
        let teachers = [];
        let allClasses = [];
        let allStreams = [];
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                currentSchoolId = userData.schoolId;
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                currentSchool = schoolDoc.data();
                
                document.getElementById('schoolName').textContent = currentSchool.name;
                document.getElementById('schoolType').textContent = 
                    currentSchool.type === 'primary' ? 'Primary School' : 'High School';
                
                // Load all data
                await loadAllData();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadAllData() {
            try {
                // Load classes
                const classesSnapshot = await db.collection('classes')
                    .where('schoolId', '==', currentSchoolId)
                    .orderBy('name')
                    .get();
                
                allClasses = [];
                classesSnapshot.forEach(doc => {
                    allClasses.push({
                        id: doc.id,
                        name: doc.data().name
                    });
                });
                
                document.getElementById('totalClasses').textContent = allClasses.length;
                
                // Load streams
                const streamsSnapshot = await db.collection('streams')
                    .where('schoolId', '==', currentSchoolId)
                    .get();
                
                allStreams = [];
                streamsSnapshot.forEach(doc => {
                    allStreams.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                document.getElementById('totalStreams').textContent = allStreams.length;
                
                // Load teachers
                await loadTeachers();
                
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }
        
        async function loadTeachers() {
            try {
                const snapshot = await db.collection('users')
                    .where('schoolId', '==', currentSchoolId)
                    .where('role', '==', 'teacher')
                    .get();
                
                teachers = [];
                snapshot.forEach(doc => {
                    teachers.push({ id: doc.id, ...doc.data() });
                });
                
                document.getElementById('totalTeachers').textContent = teachers.length;
                displayTeachers();
                
            } catch (error) {
                console.error('Error loading teachers:', error);
            }
        }
        
        function displayTeachers() {
            const container = document.getElementById('teachersContainer');
            
            if (teachers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-chalkboard-teacher"></i>
                        <h3>No Teachers Yet</h3>
                        <p>Click "Add New Teacher" to get started.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            teachers.forEach(teacher => {
                const initials = teacher.name ? teacher.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : 'T';
                
                // Format assigned classes and streams
                const assignments = teacher.assignments || {};
                let assignmentsHtml = '';
                
                if (Object.keys(assignments).length > 0) {
                    assignmentsHtml = '<div class="assigned-classes">';
                    for (const [className, streams] of Object.entries(assignments)) {
                        if (streams && streams.length > 0) {
                            assignmentsHtml += `
                                <div class="class-group">
                                    <div class="class-name">${className}</div>
                                    <div class="stream-tags">
                                        ${streams.map(s => `<span class="stream-tag">${s}</span>`).join('')}
                                    </div>
                                </div>
                            `;
                        }
                    }
                    assignmentsHtml += '</div>';
                } else {
                    assignmentsHtml = '<p style="color: #999;">No classes assigned</p>';
                }
                
                html += `
                    <div class="teacher-card">
                        <div class="teacher-header">
                            <div class="teacher-avatar">${initials}</div>
                            <div class="teacher-info">
                                <h3>${teacher.name || 'No name'}</h3>
                                <p>${teacher.employeeId || ''}</p>
                            </div>
                        </div>
                        
                        <div class="teacher-details">
                            <div class="detail-item">
                                <span class="label">Email:</span>
                                <span class="value">${teacher.email}</span>
                            </div>
                            <div class="detail-item">
                                <span class="label">Phone:</span>
                                <span class="value">${teacher.phone || 'N/A'}</span>
                            </div>
                        </div>
                        
                        ${assignmentsHtml}
                        
                        <div class="teacher-actions">
                            <button class="btn-icon edit" onclick="editTeacher('${teacher.uid}')">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn-icon delete" onclick="deleteTeacher('${teacher.uid}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        async function openAddTeacherModal() {
            editingTeacherId = null;
            document.getElementById('modalTitle').textContent = 'Add New Teacher';
            document.getElementById('teacherForm').reset();
            document.getElementById('teacherId').value = '';
            
            await loadAssignmentsSection({});
            
            document.getElementById('teacherModal').classList.add('active');
        }
        
        async function editTeacher(teacherId) {
            const teacher = teachers.find(t => t.uid === teacherId);
            if (!teacher) return;
            
            editingTeacherId = teacherId;
            document.getElementById('modalTitle').textContent = 'Edit Teacher';
            document.getElementById('teacherId').value = teacherId;
            document.getElementById('teacherName').value = teacher.name || '';
            document.getElementById('teacherEmail').value = teacher.email || '';
            document.getElementById('teacherPhone').value = teacher.phone || '';
            document.getElementById('employeeId').value = teacher.employeeId || '';
            document.getElementById('subjects').value = (teacher.subjects || []).join(', ');
            document.getElementById('qualification').value = teacher.qualification || '';
            
            await loadAssignmentsSection(teacher.assignments || {});
            
            document.getElementById('teacherModal').classList.add('active');
        }
        
        async function loadAssignmentsSection(existingAssignments = {}) {
            const container = document.getElementById('assignmentsContainer');
            
            if (allClasses.length === 0) {
                container.innerHTML = '<p>No classes available. Please add classes first.</p>';
                return;
            }
            
            let html = '';
            
            for (const cls of allClasses) {
                // Get streams for this class
                const classStreams = allStreams.filter(s => s.className === cls.name);
                
                // Get existing assignments for this class
                const selectedStreams = existingAssignments[cls.name] || [];
                
                let streamsHtml = '';
                
                if (classStreams.length > 0) {
                    streamsHtml = '<div class="stream-checkboxes">';
                    
                    // Add main class option
                    const mainChecked = selectedStreams.includes(cls.name) ? 'checked' : '';
                    streamsHtml += `
                        <label class="stream-checkbox">
                            <input type="checkbox" name="streams_${cls.name}" value="${cls.name}" ${mainChecked}>
                            ${cls.name} (Main Class)
                        </label>
                    `;
                    
                    // Add all streams
                    classStreams.forEach(stream => {
                        const streamName = stream.fullName || stream.name;
                        const checked = selectedStreams.includes(streamName) ? 'checked' : '';
                        streamsHtml += `
                            <label class="stream-checkbox">
                                <input type="checkbox" name="streams_${cls.name}" value="${streamName}" ${checked}>
                                ${streamName}
                            </label>
                        `;
                    });
                    
                    streamsHtml += '</div>';
                } else {
                    // No streams in database, just show main class option
                    const mainChecked = selectedStreams.includes(cls.name) ? 'checked' : '';
                    streamsHtml = `
                        <div class="stream-checkboxes">
                            <label class="stream-checkbox">
                                <input type="checkbox" name="streams_${cls.name}" value="${cls.name}" ${mainChecked}>
                                ${cls.name} (Main Class Only)
                            </label>
                        </div>
                    `;
                }
                
                html += `
                    <div class="class-assignment">
                        <h4>${cls.name}</h4>
                        ${streamsHtml}
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        document.getElementById('teacherForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Collect form data
            const name = document.getElementById('teacherName').value;
            const email = document.getElementById('teacherEmail').value;
            const phone = document.getElementById('teacherPhone').value;
            const employeeId = document.getElementById('employeeId').value;
            const subjects = document.getElementById('subjects').value.split(',').map(s => s.trim()).filter(s => s);
            const qualification = document.getElementById('qualification').value;
            
            // Collect assignments
            const assignments = {};
            
            allClasses.forEach(cls => {
                const checkboxes = document.querySelectorAll(`input[name="streams_${cls.name}"]:checked`);
                if (checkboxes.length > 0) {
                    assignments[cls.name] = Array.from(checkboxes).map(cb => cb.value);
                }
            });
            
            const teacherData = {
                name: name,
                email: email,
                phone: phone,
                employeeId: employeeId,
                subjects: subjects,
                qualification: qualification,
                assignments: assignments,
                schoolId: currentSchoolId,
                role: 'teacher',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                const saveBtn = document.getElementById('saveTeacherBtn');
                saveBtn.disabled = true;
                saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                
                if (editingTeacherId) {
                    // Update existing teacher
                    await db.collection('users').doc(editingTeacherId).update(teacherData);
                    showMessage('Teacher updated successfully!', 'success');
                } else {
                    // Create new teacher
                    const userCredential = await auth.createUserWithEmailAndPassword(email, 'Teacher@123');
                    teacherData.uid = userCredential.user.uid;
                    teacherData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    
                    await db.collection('users').doc(userCredential.user.uid).set(teacherData);
                    showMessage('Teacher added successfully!', 'success');
                }
                
                closeModal();
                await loadTeachers();
                
            } catch (error) {
                console.error('Error saving teacher:', error);
                showMessage('Error: ' + error.message, 'error');
            } finally {
                const saveBtn = document.getElementById('saveTeacherBtn');
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'Save Teacher';
            }
        });
        
        async function deleteTeacher(teacherId) {
            if (!confirm('Are you sure you want to delete this teacher?')) return;
            
            try {
                await db.collection('users').doc(teacherId).delete();
                showMessage('Teacher deleted', 'success');
                await loadTeachers();
            } catch (error) {
                console.error('Error deleting teacher:', error);
                showMessage('Error deleting teacher', 'error');
            }
        }
        
        function closeModal() {
            document.getElementById('teacherModal').classList.remove('active');
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
