<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve Applications - Admin</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
        }
        
        .header h1 i {
            color: #667eea;
            margin-right: 10px;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logout-btn:hover {
            background: #dc2626;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .stat-info h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-info .number {
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 20px;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 13px;
        }
        
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            height: 42px;
        }
        
        .applications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }
        
        .application-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .student-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .details {
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .detail-row .label {
            color: #666;
        }
        
        .detail-row .value {
            color: #333;
            font-weight: 500;
        }
        
        .approval-section {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
        }
        
        .btn-approve {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
        }
        
        .btn-approve:hover {
            background: #059669;
        }
        
        .btn-reject {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        
        .btn-reject:hover {
            background: #dc2626;
        }
        
        .no-data {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
            grid-column: 1/-1;
        }
        
        .no-data i {
            font-size: 60px;
            color: #cbd5e0;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1><i class="fas fa-file-signature"></i> Admission Applications</h1>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Total Applications</h3>
                    <div class="number" id="totalApps">0</div>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-file"></i>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Pending</h3>
                    <div class="number" id="pendingApps">0</div>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-clock"></i>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Approved</h3>
                    <div class="number" id="approvedApps">0</div>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Rejected</h3>
                    <div class="number" id="rejectedApps">0</div>
                </div>
                <div class="stat-icon">
                    <i class="fas fa-times-circle"></i>
                </div>
            </div>
        </div>
        
        <div class="filters">
            <div class="filter-group">
                <label>Filter by Status</label>
                <select id="statusFilter" onchange="loadApplications()">
                    <option value="all">All Applications</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Search by Name</label>
                <input type="text" id="searchInput" placeholder="Enter student name...">
            </div>
            
            <button class="btn-primary" onclick="loadApplications()">
                <i class="fas fa-search"></i> Search
            </button>
            
            <button class="btn-primary" onclick="clearFilters()">
                <i class="fas fa-undo"></i> Clear
            </button>
        </div>
        
        <div id="applicationsContainer" class="applications-grid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading applications...
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchoolId = null;
        let streams = [];
        let allApplications = [];
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'admin') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                currentSchoolId = userData.schoolId;
                
                await loadStreams();
                await loadApplications();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadStreams() {
            try {
                const snapshot = await db.collection('streams')
                    .where('schoolId', '==', currentSchoolId)
                    .get();
                
                streams = [];
                snapshot.forEach(doc => {
                    streams.push({ id: doc.id, ...doc.data() });
                });
            } catch (error) {
                console.error('Error loading streams:', error);
            }
        }
        
        async function loadApplications() {
            try {
                const statusFilter = document.getElementById('statusFilter').value;
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                
                let query = db.collection('applications')
                    .orderBy('submittedAt', 'desc');
                
                if (currentSchoolId) {
                    query = query.where('schoolId', '==', currentSchoolId);
                }
                
                if (statusFilter && statusFilter !== 'all') {
                    query = query.where('status', '==', statusFilter);
                }
                
                const snapshot = await query.get();
                
                allApplications = [];
                snapshot.forEach(doc => {
                    allApplications.push({ id: doc.id, ...doc.data() });
                });
                
                // Apply search filter
                if (searchTerm) {
                    allApplications = allApplications.filter(app => 
                        (app.firstName + ' ' + app.lastName).toLowerCase().includes(searchTerm)
                    );
                }
                
                updateStats();
                displayApplications();
                
            } catch (error) {
                console.error('Error loading applications:', error);
                
                if (error.code === 'not-found') {
                    document.getElementById('applicationsContainer').innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-file-signature"></i>
                            <h3>No Applications Yet</h3>
                            <p>Share the application link with parents: <strong>apply.html</strong></p>
                        </div>
                    `;
                }
            }
        }
        
        function updateStats() {
            const total = allApplications.length;
            const pending = allApplications.filter(a => a.status === 'pending').length;
            const approved = allApplications.filter(a => a.status === 'approved').length;
            const rejected = allApplications.filter(a => a.status === 'rejected').length;
            
            document.getElementById('totalApps').textContent = total;
            document.getElementById('pendingApps').textContent = pending;
            document.getElementById('approvedApps').textContent = approved;
            document.getElementById('rejectedApps').textContent = rejected;
        }
        
        function displayApplications() {
            const container = document.getElementById('applicationsContainer');
            
            if (allApplications.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-file-signature"></i>
                        <h3>No Applications Found</h3>
                        <p>Applications will appear here when parents apply online.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            allApplications.forEach(app => {
                const date = app.submittedAt?.seconds ? 
                    new Date(app.submittedAt.seconds * 1000).toLocaleDateString() : 'N/A';
                
                // Get streams for this class
                const classStreams = streams.filter(s => s.className === app.applyingClass);
                
                html += `
                    <div class="application-card">
                        <div class="card-header">
                            <span class="student-name">${app.firstName} ${app.lastName}</span>
                            <span class="status-badge status-${app.status || 'pending'}">${app.status || 'pending'}</span>
                        </div>
                        
                        <div class="details">
                            <div class="detail-row">
                                <span class="label">Class Applied:</span>
                                <span class="value">${app.applyingClass}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Parent:</span>
                                <span class="value">${app.parentName}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Phone:</span>
                                <span class="value">${app.parentPhone}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Email:</span>
                                <span class="value">${app.parentEmail}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Submitted:</span>
                                <span class="value">${date}</span>
                            </div>
                        </div>
                        
                        ${app.status === 'pending' ? `
                            <div class="approval-section">
                                <div class="form-group">
                                    <label>Select Stream</label>
                                    <select id="stream-${app.id}" ${classStreams.length === 0 ? 'disabled' : ''}>
                                        ${classStreams.length > 0 ? 
                                            classStreams.map(s => `<option value="${s.fullName || s.name}">${s.fullName || s.name}</option>`).join('') :
                                            '<option value="">No streams available - create one first</option>'
                                        }
                                    </select>
                                </div>
                                <button class="btn-approve" onclick="approveApplication('${app.id}', '${app.applyingClass}')">
                                    <i class="fas fa-check"></i> Approve & Create Student
                                </button>
                                <button class="btn-reject" onclick="rejectApplication('${app.id}')">
                                    <i class="fas fa-times"></i> Reject Application
                                </button>
                            </div>
                        ` : app.status === 'approved' && app.admissionNumber ? `
                            <div style="margin-top: 15px; padding: 15px; background: #d1fae5; border-radius: 8px;">
                                <p><strong>Admission No:</strong> ${app.admissionNumber}</p>
                                <p><strong>Stream:</strong> ${app.assignedStream}</p>
                                <p><strong>Approved:</strong> ${new Date(app.reviewedAt?.seconds * 1000).toLocaleDateString()}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        async function approveApplication(appId, applyingClass) {
            const streamSelect = document.getElementById(`stream-${appId}`);
            const selectedStream = streamSelect ? streamSelect.value : null;
            
            if (!selectedStream) {
                showMessage('Please select a stream', 'error');
                return;
            }
            
            try {
                // Get application data
                const appDoc = await db.collection('applications').doc(appId).get();
                const app = appDoc.data();
                
                // Generate admission number
                const year = new Date().getFullYear().toString().slice(-2);
                const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                const admissionNumber = `ADM${year}${random}`;
                
                // Create student record
                const studentData = {
                    firstName: app.firstName,
                    lastName: app.lastName,
                    name: `${app.firstName} ${app.lastName}`,
                    dob: app.dob,
                    gender: app.gender,
                    admissionNumber: admissionNumber,
                    studentClass: selectedStream,
                    parentPhone: app.parentPhone,
                    parentEmail: app.parentEmail,
                    schoolId: currentSchoolId,
                    status: 'active',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                const studentRef = await db.collection('students').add(studentData);
                
                // Create student login
                const studentEmail = `${admissionNumber.toLowerCase()}@student.school.com`;
                const studentPassword = 'Student@123';
                
                const userCredential = await auth.createUserWithEmailAndPassword(studentEmail, studentPassword);
                
                await db.collection('users').doc(userCredential.user.uid).set({
                    uid: userCredential.user.uid,
                    name: studentData.name,
                    email: studentEmail,
                    role: 'student',
                    studentId: studentRef.id,
                    schoolId: currentSchoolId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Update application
                await db.collection('applications').doc(appId).update({
                    status: 'approved',
                    admissionNumber: admissionNumber,
                    assignedStream: selectedStream,
                    reviewedBy: currentUser.uid,
                    reviewedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showMessage(`Student created! Login: ${studentEmail}`, 'success');
                
                // Refresh
                await loadApplications();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error: ' + error.message, 'error');
            }
        }
        
        async function rejectApplication(appId) {
            if (!confirm('Reject this application?')) return;
            
            try {
                await db.collection('applications').doc(appId).update({
                    status: 'rejected',
                    reviewedBy: currentUser.uid,
                    reviewedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showMessage('Application rejected', 'success');
                await loadApplications();
                
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }
        
        function clearFilters() {
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            loadApplications();
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
