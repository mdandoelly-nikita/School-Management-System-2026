<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Student Portal</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #4f46e5;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #eef2ff;
            color: #4f46e5;
        }
        
        .nav-item.active {
            background: #4f46e5;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        
        .profile-header h2 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .profile-header p {
            color: #666;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .info-item .label {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .info-item .value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }
        
        .info-item.full-width {
            grid-column: span 2;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-user-graduate"></i>
                <h2 id="studentName">Student</h2>
                <p id="studentSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="results.html" class="nav-item">
                    <i class="fas fa-chart-line"></i> My Results
                </a>
                <a href="fees.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> My Fees
                </a>
                <a href="profile.html" class="nav-item active">
                    <i class="fas fa-user"></i> Profile
                </a>
            </nav>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-user" style="margin-right: 10px; color: #4f46e5;"></i>My Profile</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="profile-card">
                <div id="profileContent">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Loading profile...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Message Toast -->
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                const studentDoc = await db.collection('students').doc(userData.studentId).get();
                const student = studentDoc.data();
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                const school = schoolDoc.data();
                
                document.getElementById('studentName').textContent = student.name || 'Student';
                document.getElementById('studentSchool').textContent = school?.name || '';
                
                const initials = student.name ? student.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : 'ST';
                const dob = student.dob ? new Date(student.dob).toLocaleDateString() : 'N/A';
                
                const profileHtml = `
                    <div class="profile-header">
                        <div class="profile-avatar">${initials}</div>
                        <h2>${student.name || 'N/A'}</h2>
                        <p>${student.admissionNumber || 'No Admission Number'}</p>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label"><i class="fas fa-calendar"></i> Date of Birth</div>
                            <div class="value">${dob}</div>
                        </div>
                        <div class="info-item">
                            <div class="label"><i class="fas fa-venus-mars"></i> Gender</div>
                            <div class="value">${student.gender || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label"><i class="fas fa-users"></i> Class</div>
                            <div class="value">${student.studentClass || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label"><i class="fas fa-school"></i> School</div>
                            <div class="value">${school?.name || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label"><i class="fas fa-phone"></i> Parent Phone</div>
                            <div class="value">${student.parentPhone || 'N/A'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label"><i class="fas fa-envelope"></i> Parent Email</div>
                            <div class="value">${student.parentEmail || 'N/A'}</div>
                        </div>
                        <div class="info-item full-width">
                            <div class="label"><i class="fas fa-map-marker-alt"></i> Address</div>
                            <div class="value">${student.address || 'N/A'}</div>
                        </div>
                    </div>
                `;
                
                document.getElementById('profileContent').innerHTML = profileHtml;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('profileContent').innerHTML = `<p style="color: red;">Error loading profile: ${error.message}</p>`;
            }
        });
        
        function logout() {
            auth.signOut().then(() => {
                window.location.href = '../../login.html';
            });
        }
    </script>
</body>
</html>
