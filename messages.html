<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Messages - Teacher Portal</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .nav-item.active {
            background: #667eea;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .assigned-info {
            background: #f0f4ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e0e7ff;
        }
        
        .assigned-info h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .class-badge {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 5px;
            font-size: 14px;
        }
        
        .parents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }
        
        .parent-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .parent-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .parent-card.has-unread {
            border-left: 4px solid #ef4444;
        }
        
        .parent-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .parent-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        
        .parent-info h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 20px;
        }
        
        .parent-info .child-name {
            color: #667eea;
            font-weight: 500;
            background: #f0f4ff;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            font-size: 13px;
        }
        
        .contact-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .contact-info p {
            margin: 8px 0;
            color: #555;
        }
        
        .contact-info i {
            width: 20px;
            color: #667eea;
            margin-right: 8px;
        }
        
        .chat-section {
            margin-top: 20px;
            border-top: 2px dashed #e0e0e0;
            padding-top: 20px;
        }
        
        .messages-container {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin: 15px 0;
            display: flex;
            flex-direction: column;
        }
        
        .message {
            margin-bottom: 10px;
            max-width: 80%;
        }
        
        .message.sent {
            align-self: flex-end;
            margin-left: auto;
        }
        
        .message.received {
            align-self: flex-start;
        }
        
        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
        }
        
        .message.received .message-bubble {
            background: white;
            border: 1px solid #e0e0e0;
        }
        
        .message.sent .message-bubble {
            background: #667eea;
            color: white;
        }
        
        .message-text {
            font-size: 14px;
            margin-bottom: 3px;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            text-align: right;
        }
        
        .message-input-area {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .message-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .message-input-area input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .message-input-area button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .message-input-area button:hover {
            background: #5a67d8;
        }
        
        .message-input-area button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        
        .no-parents {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
            grid-column: 1 / -1;
        }
        
        .no-parents i {
            font-size: 60px;
            color: #cbd5e0;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message-toast.show {
            display: block;
        }
        
        .message-toast.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message-toast.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-chalkboard-teacher"></i>
                <h2 id="teacherName">Teacher</h2>
                <p id="teacherSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="enter-marks.html" class="nav-item">
                    <i class="fas fa-pen"></i> Enter Marks
                </a>
                <a href="messages.html" class="nav-item active">
                    <i class="fas fa-comments"></i> Messages
                </a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-comments" style="margin-right: 10px; color: #667eea;"></i>Parent Messages</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div id="assignedInfo" class="assigned-info">
                <div class="loading">Loading your classes...</div>
            </div>
            
            <div id="parentsContainer" class="parents-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading conversations...
                </div>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message-toast"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        // ============================================
        // FIREBASE DATABASE FUNCTIONS - FIXED VERSION
        // ============================================
        
        let currentUser = null;
        let currentTeacher = null;
        let messageListeners = new Map();
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message-toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Get Realtime Database instance - FIXED: no URL needed
        function getDatabase() {
            try {
                console.log('Getting database instance...');
                // Just call firebase.database() with no arguments
                const db = firebase.database();
                console.log('✅ Database instance obtained');
                return db;
            } catch (error) {
                console.error('❌ Error getting database:', error);
                showMessage('Database connection error', 'error');
                return null;
            }
        }
        
        // Test database connection
        function testDatabaseConnection() {
            try {
                const db = getDatabase();
                if (!db) return;
                
                console.log('Testing database connection...');
                const connectedRef = db.ref('.info/connected');
                
                connectedRef.on('value', (snap) => {
                    if (snap.val() === true) {
                        console.log('✅ Database connected successfully!');
                    } else {
                        console.log('⏳ Waiting for connection...');
                    }
                });
            } catch (error) {
                console.error('Connection test failed:', error);
            }
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            // Test database connection
            testDatabaseConnection();
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    showMessage('User data not found', 'error');
                    return;
                }
                
                currentTeacher = userDoc.data();
                
                if (currentTeacher.role !== 'teacher') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                document.getElementById('teacherName').textContent = currentTeacher.name || 'Teacher';
                
                const schoolDoc = await db.collection('schools').doc(currentTeacher.schoolId).get();
                if (schoolDoc.exists) {
                    document.getElementById('teacherSchool').textContent = schoolDoc.data().name;
                }
                
                displayAssignedInfo();
                await loadParentConversations();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        function displayAssignedInfo() {
            const container = document.getElementById('assignedInfo');
            
            let html = '<h2><i class="fas fa-chalkboard-teacher"></i> Your Assigned Classes/Streams</h2><div>';
            
            if (currentTeacher.assignedClass) {
                html += `<span class="class-badge"><i class="fas fa-users"></i> ${currentTeacher.assignedClass}</span>`;
            }
            
            if (currentTeacher.assignedStream) {
                html += `<span class="class-badge"><i class="fas fa-layer-group"></i> ${currentTeacher.assignedStream}</span>`;
            }
            
            if (!currentTeacher.assignedClass && !currentTeacher.assignedStream) {
                html += '<p style="color: #999;">No classes assigned yet</p>';
            }
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        async function loadParentConversations() {
            const container = document.getElementById('parentsContainer');
            
            // Find parents whose children are in this teacher's classes
            const studentsSnapshot = await db.collection('students')
                .where('schoolId', '==', currentTeacher.schoolId)
                .get();
            
            const relevantParents = new Map();
            
            for (const studentDoc of studentsSnapshot.docs) {
                const student = studentDoc.data();
                
                // Check if this student belongs to teacher's class/stream
                const matchesTeacher = 
                    (currentTeacher.assignedClass && student.studentClass === currentTeacher.assignedClass) ||
                    (currentTeacher.assignedStream && student.studentClass === currentTeacher.assignedStream);
                
                if (matchesTeacher) {
                    // Find parents linked to this student
                    const parentsSnapshot = await db.collection('users')
                        .where('schoolId', '==', currentTeacher.schoolId)
                        .where('role', '==', 'parent')
                        .get();
                    
                    parentsSnapshot.forEach(parentDoc => {
                        const parent = parentDoc.data();
                        if (parent.children && parent.children.includes(studentDoc.id)) {
                            relevantParents.set(parentDoc.id, {
                                id: parentDoc.id,
                                name: parent.name,
                                email: parent.email,
                                phone: parent.phone,
                                childName: `${student.firstName || ''} ${student.lastName || ''}`.trim(),
                                childClass: student.studentClass
                            });
                        }
                    });
                }
            }
            
            if (relevantParents.size === 0) {
                container.innerHTML = `
                    <div class="no-parents">
                        <i class="fas fa-users"></i>
                        <h3>No Parents Found</h3>
                        <p>No parents have children in your assigned classes yet.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            for (const [parentId, parent] of relevantParents) {
                // Get initials
                const initials = parent.name ? parent.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : 'P';
                
                html += `
                    <div class="parent-card" id="parent-${parentId}">
                        <div class="parent-header">
                            <div class="parent-avatar">${initials}</div>
                            <div class="parent-info">
                                <h3>${parent.name || 'Parent'}</h3>
                                <span class="child-name">${parent.childName} - ${parent.childClass}</span>
                            </div>
                        </div>
                        
                        <div class="contact-info">
                            <p><i class="fas fa-phone"></i> ${parent.phone || 'No phone'}</p>
                            <p><i class="fas fa-envelope"></i> ${parent.email || 'No email'}</p>
                        </div>
                        
                        <div class="chat-section">
                            <h4 style="margin-bottom: 15px; color: #333;">
                                <i class="fas fa-comments"></i> Chat with ${parent.name}
                            </h4>
                            
                            <div class="messages-container" id="messages-${parentId}">
                                <div style="text-align: center; color: #999; padding: 20px;">No messages yet</div>
                            </div>
                            
                            <div class="message-input-area">
                                <input type="text" id="input-${parentId}" 
                                       placeholder="Type your message..." 
                                       onkeypress="handleKeyPress(event, '${parentId}')">
                                <button onclick="sendMessageToParent('${parentId}')" id="btn-${parentId}">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                // Start listening for messages
                await setupMessageListener(parentId);
            }
            
            container.innerHTML = html;
        }
        
        // ============================================
        // CHAT FUNCTIONS (SAME AS PARENT)
        // ============================================
        
        async function getOrCreateConversation(user1Id, user2Id) {
            try {
                const db = getDatabase();
                if (!db) {
                    showMessage('Database not available', 'error');
                    return null;
                }
                
                const conversationId = [user1Id, user2Id].sort().join('_');
                console.log('Conversation ID:', conversationId);
                
                const conversationRef = db.ref(`conversations/${conversationId}`);
                const snapshot = await conversationRef.once('value');
                
                if (!snapshot.exists()) {
                    console.log('Creating new conversation...');
                    await conversationRef.set({
                        participants: [user1Id, user2Id],
                        createdAt: firebase.database.ServerValue.TIMESTAMP,
                        lastMessage: '',
                        lastMessageTime: firebase.database.ServerValue.TIMESTAMP
                    });
                    console.log('✅ New conversation created');
                }
                
                return conversationId;
            } catch (error) {
                console.error('❌ Error in conversation:', error);
                showMessage('Error setting up chat', 'error');
                return null;
            }
        }
        
        async function sendMessage(conversationId, senderId, senderName, senderRole, text) {
            try {
                const db = getDatabase();
                if (!db) return false;
                
                console.log('Sending message to conversation:', conversationId);
                
                const messageRef = db.ref(`messages/${conversationId}`).push();
                
                const messageData = {
                    senderId,
                    senderName,
                    senderRole,
                    text,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    read: false
                };
                
                await messageRef.set(messageData);
                console.log('✅ Message saved');
                
                await db.ref(`conversations/${conversationId}`).update({
                    lastMessage: text.substring(0, 50),
                    lastMessageTime: firebase.database.ServerValue.TIMESTAMP,
                    lastMessageSender: senderId
                });
                
                console.log('✅ Conversation updated');
                return true;
            } catch (error) {
                console.error('❌ Error sending message:', error);
                return false;
            }
        }
        
        function listenToMessages(conversationId, callback) {
            try {
                const db = getDatabase();
                if (!db) return null;
                
                console.log('Listening to messages for:', conversationId);
                
                const messagesRef = db.ref(`messages/${conversationId}`).orderByChild('timestamp');
                
                const listener = messagesRef.on('value', (snapshot) => {
                    const messages = [];
                    snapshot.forEach((childSnapshot) => {
                        messages.push({
                            id: childSnapshot.key,
                            ...childSnapshot.val()
                        });
                    });
                    console.log('Received', messages.length, 'messages');
                    callback(messages);
                });
                
                return listener;
            } catch (error) {
                console.error('❌ Error listening to messages:', error);
                return null;
            }
        }
        
        function formatMessageTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 24 * 60 * 60 * 1000 && date.getDate() === now.getDate()) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            if (diff < 48 * 60 * 60 * 1000) {
                return 'Yesterday';
            }
            return date.toLocaleDateString();
        }
        
        async function setupMessageListener(parentId) {
            try {
                if (messageListeners.has(parentId)) {
                    const oldListener = messageListeners.get(parentId);
                    if (oldListener) {
                        const db = getDatabase();
                        if (db) {
                            db.ref(`messages`).off('value', oldListener);
                        }
                    }
                }
                
                const conversationId = await getOrCreateConversation(currentUser.uid, parentId);
                if (!conversationId) return;
                
                const listener = listenToMessages(conversationId, (messages) => {
                    displayMessages(parentId, messages);
                });
                
                if (listener) {
                    messageListeners.set(parentId, listener);
                }
            } catch (error) {
                console.error('Error setting up message listener:', error);
            }
        }
        
        function displayMessages(parentId, messages) {
            const container = document.getElementById(`messages-${parentId}`);
            if (!container) return;
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">No messages yet. Say hello!</div>';
                return;
            }
            
            let html = '';
            messages.forEach(msg => {
                const isSent = msg.senderId === currentUser.uid;
                const time = formatMessageTime(msg.timestamp);
                
                html += `
                    <div class="message ${isSent ? 'sent' : 'received'}" style="max-width: 80%; margin-bottom: 10px; ${isSent ? 'margin-left: auto;' : ''}">
                        <div class="message-bubble">
                            <div class="message-text">${msg.text}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        async function sendMessageToParent(parentId) {
            const input = document.getElementById(`input-${parentId}`);
            const text = input.value.trim();
            
            if (!text) return;
            
            const button = document.getElementById(`btn-${parentId}`);
            button.disabled = true;
            
            try {
                console.log('Sending message to parent:', parentId);
                
                const conversationId = await getOrCreateConversation(currentUser.uid, parentId);
                
                if (conversationId) {
                    const success = await sendMessage(
                        conversationId,
                        currentUser.uid,
                        currentTeacher.name || 'Teacher',
                        'teacher',
                        text
                    );
                    
                    if (success) {
                        input.value = '';
                        showMessage('Message sent!', 'success');
                    } else {
                        showMessage('Failed to send message', 'error');
                    }
                }
            } catch (error) {
                console.error('Error sending message:', error);
                showMessage('Error sending message', 'error');
            } finally {
                button.disabled = false;
            }
        }
        
        function handleKeyPress(e, parentId) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessageToParent(parentId);
            }
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
