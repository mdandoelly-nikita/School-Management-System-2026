<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fees - Student Portal</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #4f46e5;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #eef2ff;
            color: #4f46e5;
        }
        
        .nav-item.active {
            background: #4f46e5;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .welcome-card {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .welcome-card h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .welcome-card p {
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .stat-card .amount {
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-card .total { color: #333; }
        .stat-card .paid { color: #10b981; }
        .stat-card .balance { color: #ef4444; }
        
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .info-card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .fee-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .fee-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            color: #666;
            font-weight: 500;
        }
        
        .fee-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .fee-table tr:last-child td {
            border-bottom: none;
        }
        
        .fee-total-row {
            background: #f8f9fa;
            font-weight: bold;
        }
        
        .class-fee {
            background: #eef2ff;
        }
        
        .individual-fee {
            background: #fff3cd;
        }
        
        .payment-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .payment-table th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            color: #666;
        }
        
        .payment-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .payment-success {
            background: #d1fae5;
            color: #065f46;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .no-data i {
            font-size: 50px;
            color: #cbd5e0;
            margin-bottom: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-user-graduate"></i>
                <h2 id="studentName">Student</h2>
                <p id="studentSchool"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="results.html" class="nav-item">
                    <i class="fas fa-chart-line"></i> My Results
                </a>
                <a href="fees.html" class="nav-item active">
                    <i class="fas fa-credit-card"></i> My Fees
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="fas fa-user"></i> Profile
                </a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-credit-card" style="margin-right: 10px; color: #4f46e5;"></i>My Fees</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="welcome-card">
                <h2>Fee Statement</h2>
                <p>Track your fees, payments, and balance</p>
            </div>
            
            <!-- Stats -->
            <div class="stats-grid" id="statsContainer">
                <div class="stat-card">
                    <h3>Total Fees</h3>
                    <div class="amount total" id="totalFees">KES 0</div>
                </div>
                <div class="stat-card">
                    <h3>Amount Paid</h3>
                    <div class="amount paid" id="paidFees">KES 0</div>
                </div>
                <div class="stat-card">
                    <h3>Balance</h3>
                    <div class="amount balance" id="balanceFees">KES 0</div>
                </div>
            </div>
            
            <!-- Fee Breakdown -->
            <div class="info-card">
                <h2><i class="fas fa-receipt"></i> Fee Breakdown</h2>
                <div id="feeBreakdown">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Loading fee structure...
                    </div>
                </div>
            </div>
            
            <!-- Payment History -->
            <div class="info-card">
                <h2><i class="fas fa-history"></i> Payment History</h2>
                <div id="paymentHistory">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Loading payments...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let studentData = null;
        let studentId = null;
        let schoolId = null;
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                console.log('Loading student data...');
                
                // Get user data
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    showMessage('User data not found', 'error');
                    return;
                }
                
                const userData = userDoc.data();
                
                if (userData.role !== 'student') {
                    showMessage('Access denied', 'error');
                    setTimeout(() => window.location.href = '../../login.html', 2000);
                    return;
                }
                
                studentId = userData.studentId;
                schoolId = userData.schoolId;
                
                console.log('Student ID:', studentId);
                console.log('School ID:', schoolId);
                
                // Get student data
                const studentDoc = await db.collection('students').doc(studentId).get();
                
                if (!studentDoc.exists) {
                    showMessage('Student record not found', 'error');
                    return;
                }
                
                studentData = studentDoc.data();
                console.log('Student data:', studentData);
                
                document.getElementById('studentName').textContent = studentData.name || 'Student';
                
                // Get school name
                const schoolDoc = await db.collection('schools').doc(schoolId).get();
                if (schoolDoc.exists) {
                    document.getElementById('studentSchool').textContent = schoolDoc.data().name;
                }
                
                // Load fees and payments
                await loadFees();
                await loadPayments();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data: ' + error.message, 'error');
            }
        });
        
        async function loadFees() {
            try {
                console.log('Loading fees for student...');
                
                // Determine base class (handle streams)
                let baseClass = studentData.studentClass;
                
                // Check if this is a stream
                const streamIndicators = ['WEST', 'EAST', 'NORTH', 'SOUTH', ' - '];
                const isStream = streamIndicators.some(indicator => 
                    studentData.studentClass?.toUpperCase().includes(indicator)
                );
                
                console.log('Is stream:', isStream);
                
                if (isStream && studentData.studentClass) {
                    // Extract base class (e.g., "FORM 3 WEST" -> "FORM 3")
                    const formMatch = studentData.studentClass.match(/(FORM\s+\d+)/i);
                    if (formMatch) {
                        baseClass = formMatch[0].toUpperCase();
                    } else {
                        const numberMatch = studentData.studentClass.match(/\d+/);
                        if (numberMatch) {
                            baseClass = `FORM ${numberMatch[0]}`;
                        }
                    }
                }
                
                console.log('Base class:', baseClass);
                
                // Get class-based fee structure
                let classFee = 0;
                let classFeeStructure = null;
                
                if (baseClass) {
                    const feeSnapshot = await db.collection('feeStructures')
                        .where('schoolId', '==', schoolId)
                        .where('className', '==', baseClass)
                        .get();
                    
                    console.log('Fee structure query result size:', feeSnapshot.size);
                    
                    if (!feeSnapshot.empty) {
                        classFeeStructure = feeSnapshot.docs[0].data();
                        classFee = (classFeeStructure.tuition || 0) + (classFeeStructure.activity || 0) + 
                                  (classFeeStructure.library || 0) + (classFeeStructure.ict || 0) + (classFeeStructure.sports || 0);
                        console.log('Class fee found:', classFee);
                    } else {
                        console.log('No class fee structure found for:', baseClass);
                    }
                }
                
                // Get individual fees
                let individualTotal = 0;
                let individualFees = [];
                
                try {
                    const individualSnapshot = await db.collection('studentFees')
                        .where('schoolId', '==', schoolId)
                        .where('studentId', '==', studentId)
                        .where('status', '==', 'active')
                        .get();
                    
                    console.log('Individual fees found:', individualSnapshot.size);
                    
                    individualSnapshot.forEach(doc => {
                        const fee = doc.data();
                        individualFees.push({ id: doc.id, ...fee });
                        individualTotal += fee.amount || 0;
                        console.log('Individual fee:', fee);
                    });
                } catch (error) {
                    console.log('No individual fees collection or error:', error);
                }
                
                // Calculate total fees
                const totalFees = classFee + individualTotal;
                console.log('Total fees:', totalFees);
                
                document.getElementById('totalFees').textContent = `KES ${totalFees.toLocaleString()}`;
                
                // Display fee breakdown
                displayFeeBreakdown(classFeeStructure, classFee, individualFees, individualTotal, baseClass, isStream);
                
            } catch (error) {
                console.error('Error loading fees:', error);
                document.getElementById('feeBreakdown').innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error loading fee structure: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        function displayFeeBreakdown(classFeeStructure, classFee, individualFees, individualTotal, baseClass, isStream) {
            const container = document.getElementById('feeBreakdown');
            
            if (!classFeeStructure && individualFees.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-coins"></i>
                        <p>No fee structure set for your class.</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table class="fee-table">
                    <thead>
                        <tr>
                            <th>Fee Type</th>
                            <th>Amount (KES)</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            // Add class fee if exists
            if (classFeeStructure) {
                html += `
                    <tr class="class-fee">
                        <td>
                            <strong>${baseClass} Class Fee</strong>
                            ${isStream ? `<br><small style="color: #4f46e5;">Your stream (${studentData.studentClass}) uses ${baseClass} fees</small>` : ''}
                        </td>
                        <td>${classFee.toLocaleString()}</td>
                    </tr>
                `;
            }
            
            // Add individual fees
            individualFees.forEach(fee => {
                const feeType = fee.feeType ? fee.feeType.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase()) : 'Additional Fee';
                html += `
                    <tr class="individual-fee">
                        <td>
                            <strong>${feeType}</strong>
                            ${fee.description ? `<br><small>${fee.description}</small>` : ''}
                            ${fee.dueDate ? `<br><small>Due: ${new Date(fee.dueDate.seconds * 1000).toLocaleDateString()}</small>` : ''}
                        </td>
                        <td>${fee.amount.toLocaleString()}</td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                    <tfoot>
                        <tr class="fee-total-row">
                            <td><strong>TOTAL FEES</strong></td>
                            <td><strong>${(classFee + individualTotal).toLocaleString()}</strong></td>
                        </tr>
                    </tfoot>
                </table>
            `;
            
            container.innerHTML = html;
        }
        
        async function loadPayments() {
            try {
                console.log('Loading payments for student...');
                
                // Try to get payments from the payments collection
                const snapshot = await db.collection('payments')
                    .where('schoolId', '==', schoolId)
                    .where('studentId', '==', studentId)
                    .orderBy('date', 'desc')
                    .get();
                
                console.log('Payments found:', snapshot.size);
                
                const container = document.getElementById('paymentHistory');
                let totalPaid = 0;
                
                if (snapshot.empty) {
                    container.innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-credit-card"></i>
                            <p>No payments recorded yet.</p>
                        </div>
                    `;
                    document.getElementById('paidFees').textContent = 'KES 0';
                    
                    // Get total from totalFees element
                    const totalText = document.getElementById('totalFees').textContent;
                    const total = parseInt(totalText.replace('KES ', '').replace(/,/g, '')) || 0;
                    document.getElementById('balanceFees').textContent = `KES ${total.toLocaleString()}`;
                    return;
                }
                
                let html = `
                    <table class="payment-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Method</th>
                                <th>Transaction</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                snapshot.forEach(doc => {
                    const p = doc.data();
                    const date = p.date?.seconds ? new Date(p.date.seconds * 1000).toLocaleDateString() : 'N/A';
                    totalPaid += p.amount || 0;
                    
                    html += `
                        <tr>
                            <td>${date}</td>
                            <td>${p.method || 'M-Pesa'}</td>
                            <td>${p.transactionCode || 'N/A'}</td>
                            <td><strong>KES ${(p.amount || 0).toLocaleString()}</strong></td>
                            <td><span class="payment-success">Paid</span></td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table>';
                container.innerHTML = html;
                
                document.getElementById('paidFees').textContent = `KES ${totalPaid.toLocaleString()}`;
                
                // Calculate balance
                const totalText = document.getElementById('totalFees').textContent;
                const total = parseInt(totalText.replace('KES ', '').replace(/,/g, '')) || 0;
                const balance = total - totalPaid;
                document.getElementById('balanceFees').textContent = `KES ${balance.toLocaleString()}`;
                
                console.log('Total paid:', totalPaid);
                console.log('Balance:', balance);
                
            } catch (error) {
                console.error('Error loading payments:', error);
                
                // Check if error is because collection doesn't exist or needs index
                if (error.code === 'failed-precondition' || error.message.includes('index')) {
                    document.getElementById('paymentHistory').innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-database"></i>
                            <p>Payment system is being set up. Please check back later.</p>
                            <small style="color: #666;">Error: ${error.message.substring(0, 100)}</small>
                        </div>
                    `;
                } else {
                    document.getElementById('paymentHistory').innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Error loading payments: ${error.message}</p>
                        </div>
                    `;
                }
                
                // Still update paid amount to 0
                document.getElementById('paidFees').textContent = 'KES 0';
                const totalText = document.getElementById('totalFees').textContent;
                const total = parseInt(totalText.replace('KES ', '').replace(/,/g, '')) || 0;
                document.getElementById('balanceFees').textContent = `KES ${total.toLocaleString()}`;
            }
        }
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
