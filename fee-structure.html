<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Structure - School System</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .nav-item.active {
            background: #667eea;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .stat-info h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-info .number {
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 20px;
        }
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .class-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 2px solid #e0e0e0;
        }
        
        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f4ff;
        }
        
        .class-header h3 {
            color: #333;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .fee-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .fee-row label {
            color: #666;
            font-size: 14px;
        }
        
        .fee-row input {
            width: 120px;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            text-align: right;
        }
        
        .fee-row input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .fee-total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        
        .save-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .save-btn:hover {
            background: #5a67d8;
        }
        
        .no-classes {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
            grid-column: 1 / -1;
        }
        
        .no-classes i {
            font-size: 60px;
            color: #cbd5e0;
            margin-bottom: 20px;
        }
        
        .no-classes a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-school"></i>
                <h2 id="schoolName">Loading...</h2>
                <p id="schoolType"></p>
            </div>
            <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item">
        <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a href="teachers.html" class="nav-item">
        <i class="fas fa-users"></i> Teachers
    </a>
    <a href="students.html" class="nav-item">
        <i class="fas fa-user-graduate"></i> Students
    </a>
    <a href="parents.html" class="nav-item">
        <i class="fas fa-family"></i> Parents
    </a>
    <a href="classes.html" class="nav-item">
        <i class="fas fa-book"></i> Classes
    </a>
    <a href="finance-officers.html" class="nav-item">
        <i class="fas fa-coins"></i> Finance Officers
    </a>
    <a href="fee-structure.html" class="nav-item active">
        <i class="fas fa-coins"></i> Fee Structure
    </a>
    <a href="fee-payments.html" class="nav-item">
        <i class="fas fa-credit-card"></i> Payments
    </a>
    <a href="fee-reports.html" class="nav-item">
        <i class="fas fa-chart-pie"></i> Reports
    </a>
    <a href="notifications.html" class="nav-item">
        <i class="fas fa-bell"></i> Notifications
    </a>
    <a href="approve-applications.html" class="nav-item">
    <i class="fas fa-file-signature"></i> Applications
</a>
<a href="student-results.html" class="nav-item">
    <i class="fas fa-chart-line"></i> Student Results
</a>
</nav>
        </div>
        
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-coins" style="margin-right: 10px; color: #667eea;"></i>Fee Structure</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Classes</h3>
                        <div class="number" id="totalClasses">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-school"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Configured</h3>
                        <div class="number" id="configuredClasses">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
            </div>
            
            <div class="action-bar">
                <h2 style="color: #333;">Set Fees Per Class</h2>
                <button class="btn-primary" onclick="applyToAll()">
                    <i class="fas fa-copy"></i> Apply to All Classes
                </button>
            </div>
            
            <div id="classesContainer" class="classes-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading classes...
                </div>
            </div>
        </div>
    </div>
    
    <div id="applyModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div class="modal-content" style="background: white; border-radius: 12px; width: 90%; max-width: 500px; padding: 30px;">
            <h2 style="margin-bottom: 20px;">Apply to All Classes</h2>
            
            <div class="fee-row">
                <label>Tuition Fee (KES)</label>
                <input type="number" id="applyTuition" value="15000">
            </div>
            <div class="fee-row">
                <label>Activity Fee (KES)</label>
                <input type="number" id="applyActivity" value="2000">
            </div>
            <div class="fee-row">
                <label>Library Fee (KES)</label>
                <input type="number" id="applyLibrary" value="1000">
            </div>
            <div class="fee-row">
                <label>ICT Fee (KES)</label>
                <input type="number" id="applyICT" value="1500">
            </div>
            <div class="fee-row">
                <label>Sports Fee (KES)</label>
                <input type="number" id="applySports" value="1000">
            </div>
            
            <div class="fee-total" style="margin: 20px 0; padding: 15px 0;">
                <span>Total per student:</span>
                <span id="applyTotal">KES 20,500</span>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn-secondary" onclick="closeApplyModal()">Cancel</button>
                <button class="btn-primary" onclick="confirmApplyToAll()">Apply to All</button>
            </div>
        </div>
    </div>
    
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchool = null;
        let currentSchoolId = null;
        let classes = [];
        let feeStructures = {};
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                currentSchoolId = userData.schoolId;
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                currentSchool = schoolDoc.data();
                
                document.getElementById('schoolName').textContent = currentSchool.name;
                document.getElementById('schoolType').textContent = 
                    currentSchool.type === 'primary' ? 'Primary School' : 'High School';
                
                await loadClasses();
                await loadFeeStructures();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadClasses() {
            const snapshot = await db.collection('classes')
                .where('schoolId', '==', currentSchoolId)
                .orderBy('name')
                .get();
            
            classes = [];
            snapshot.forEach(doc => {
                classes.push({ id: doc.id, ...doc.data() });
            });
            
            document.getElementById('totalClasses').textContent = classes.length;
            
            if (classes.length === 0) {
                document.getElementById('classesContainer').innerHTML = `
                    <div class="no-classes">
                        <i class="fas fa-school"></i>
                        <h3>No Classes Added Yet</h3>
                        <p>Please go to <a href="classes.html">Classes Management</a> to add classes first.</p>
                    </div>
                `;
                return;
            }
            
            displayClasses();
        }
        
        async function loadFeeStructures() {
            const snapshot = await db.collection('feeStructures')
                .where('schoolId', '==', currentSchoolId)
                .get();
            
            feeStructures = {};
            snapshot.forEach(doc => {
                const data = doc.data();
                feeStructures[data.className] = {
                    id: doc.id,
                    ...data
                };
            });
            
            document.getElementById('configuredClasses').textContent = Object.keys(feeStructures).length;
            displayClasses(); // Refresh display with fee data
        }
        
        function displayClasses() {
            const container = document.getElementById('classesContainer');
            
            let html = '';
            let configuredCount = 0;
            
            classes.forEach(cls => {
                const fee = feeStructures[cls.name] || {
                    tuition: '',
                    activity: '',
                    library: '',
                    ict: '',
                    sports: ''
                };
                
                if (fee.tuition) configuredCount++;
                
                const total = (parseInt(fee.tuition) || 0) + 
                             (parseInt(fee.activity) || 0) + 
                             (parseInt(fee.library) || 0) + 
                             (parseInt(fee.ict) || 0) + 
                             (parseInt(fee.sports) || 0);
                
                html += `
                    <div class="class-card" id="class-${cls.name.replace(/\s/g, '')}">
                        <div class="class-header">
                            <h3><i class="fas fa-users"></i> ${cls.name}</h3>
                        </div>
                        
                        <div class="fee-row">
                            <label>Tuition Fee</label>
                            <input type="number" class="tuition" data-class="${cls.name}" value="${fee.tuition || ''}" placeholder="0" oninput="updateTotal('${cls.name}')">
                        </div>
                        
                        <div class="fee-row">
                            <label>Activity Fee</label>
                            <input type="number" class="activity" data-class="${cls.name}" value="${fee.activity || ''}" placeholder="0" oninput="updateTotal('${cls.name}')">
                        </div>
                        
                        <div class="fee-row">
                            <label>Library Fee</label>
                            <input type="number" class="library" data-class="${cls.name}" value="${fee.library || ''}" placeholder="0" oninput="updateTotal('${cls.name}')">
                        </div>
                        
                        <div class="fee-row">
                            <label>ICT Fee</label>
                            <input type="number" class="ict" data-class="${cls.name}" value="${fee.ict || ''}" placeholder="0" oninput="updateTotal('${cls.name}')">
                        </div>
                        
                        <div class="fee-row">
                            <label>Sports Fee</label>
                            <input type="number" class="sports" data-class="${cls.name}" value="${fee.sports || ''}" placeholder="0" oninput="updateTotal('${cls.name}')">
                        </div>
                        
                        <div class="fee-total">
                            <span>Total per Term:</span>
                            <strong id="total-${cls.name.replace(/\s/g, '')}">KES ${total.toLocaleString()}</strong>
                        </div>
                        
                        <button class="save-btn" onclick="saveClassFee('${cls.name}')">
                            <i class="fas fa-save"></i> Save for ${cls.name}
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('configuredClasses').textContent = configuredCount;
        }
        
        function updateTotal(className) {
            const card = document.getElementById(`class-${className.replace(/\s/g, '')}`);
            const tuition = parseInt(card.querySelector('.tuition').value) || 0;
            const activity = parseInt(card.querySelector('.activity').value) || 0;
            const library = parseInt(card.querySelector('.library').value) || 0;
            const ict = parseInt(card.querySelector('.ict').value) || 0;
            const sports = parseInt(card.querySelector('.sports').value) || 0;
            
            const total = tuition + activity + library + ict + sports;
            document.getElementById(`total-${className.replace(/\s/g, '')}`).textContent = `KES ${total.toLocaleString()}`;
        }
        
        async function saveClassFee(className) {
            const card = document.getElementById(`class-${className.replace(/\s/g, '')}`);
            const tuition = parseInt(card.querySelector('.tuition').value) || 0;
            const activity = parseInt(card.querySelector('.activity').value) || 0;
            const library = parseInt(card.querySelector('.library').value) || 0;
            const ict = parseInt(card.querySelector('.ict').value) || 0;
            const sports = parseInt(card.querySelector('.sports').value) || 0;
            
            const feeData = {
                schoolId: currentSchoolId,
                className: className,
                tuition: tuition,
                activity: activity,
                library: library,
                ict: ict,
                sports: sports,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                if (feeStructures[className]) {
                    await db.collection('feeStructures').doc(feeStructures[className].id).update(feeData);
                    showMessage(`Fee structure updated for ${className}`, 'success');
                } else {
                    feeData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('feeStructures').add(feeData);
                    showMessage(`Fee structure saved for ${className}`, 'success');
                }
                
                await loadFeeStructures();
                
            } catch (error) {
                console.error('Error saving fee:', error);
                showMessage('Error saving fee structure', 'error');
            }
        }
        
        function applyToAll() {
            document.getElementById('applyModal').style.display = 'flex';
            updateApplyTotal();
        }
        
        function closeApplyModal() {
            document.getElementById('applyModal').style.display = 'none';
        }
        
        function updateApplyTotal() {
            const tuition = parseInt(document.getElementById('applyTuition').value) || 0;
            const activity = parseInt(document.getElementById('applyActivity').value) || 0;
            const library = parseInt(document.getElementById('applyLibrary').value) || 0;
            const ict = parseInt(document.getElementById('applyICT').value) || 0;
            const sports = parseInt(document.getElementById('applySports').value) || 0;
            
            const total = tuition + activity + library + ict + sports;
            document.getElementById('applyTotal').textContent = `KES ${total.toLocaleString()}`;
        }
        
        async function confirmApplyToAll() {
            const tuition = parseInt(document.getElementById('applyTuition').value) || 0;
            const activity = parseInt(document.getElementById('applyActivity').value) || 0;
            const library = parseInt(document.getElementById('applyLibrary').value) || 0;
            const ict = parseInt(document.getElementById('applyICT').value) || 0;
            const sports = parseInt(document.getElementById('applySports').value) || 0;
            
            try {
                for (const cls of classes) {
                    const feeData = {
                        schoolId: currentSchoolId,
                        className: cls.name,
                        tuition: tuition,
                        activity: activity,
                        library: library,
                        ict: ict,
                        sports: sports,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    if (feeStructures[cls.name]) {
                        await db.collection('feeStructures').doc(feeStructures[cls.name].id).update(feeData);
                    } else {
                        feeData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection('feeStructures').add(feeData);
                    }
                }
                
                showMessage('Fee structure applied to all classes!', 'success');
                closeApplyModal();
                await loadFeeStructures();
                
            } catch (error) {
                console.error('Error applying to all:', error);
                showMessage('Error applying fee structure', 'error');
            }
        }
        
        // Add input listeners for apply modal
        document.getElementById('applyTuition').addEventListener('input', updateApplyTotal);
        document.getElementById('applyActivity').addEventListener('input', updateApplyTotal);
        document.getElementById('applyLibrary').addEventListener('input', updateApplyTotal);
        document.getElementById('applyICT').addEventListener('input', updateApplyTotal);
        document.getElementById('applySports').addEventListener('input', updateApplyTotal);
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
