<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Management - School System</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f3f4f6;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .sidebar-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .sidebar-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .sidebar-nav {
            padding: 20px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        
        .nav-item:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .nav-item.active {
            background: #667eea;
            color: white;
        }
        
        .nav-item i {
            width: 25px;
            margin-right: 10px;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .page-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info span {
            color: #666;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 5px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fee2e2;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .stat-info h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .stat-info .number {
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 20px;
        }
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .search-bar {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 500px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .filter-select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .student-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .student-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .student-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .student-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        
        .student-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .student-info .admission {
            color: #667eea;
            font-size: 13px;
            background: #f0f4ff;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .student-details {
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .detail-row .label {
            color: #666;
        }
        
        .detail-row .value {
            color: #333;
            font-weight: 500;
        }
        
        .student-class {
            display: inline-block;
            background: #f0f4ff;
            color: #667eea;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .student-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        
        .btn-icon {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: #666;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
        }
        
        .btn-icon:hover {
            background: #f3f4f6;
        }
        
        .btn-icon.edit:hover {
            background: #f0f4ff;
            color: #667eea;
        }
        
        .btn-icon.delete:hover {
            background: #fee2e2;
            color: #ef4444;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f4ff;
        }
        
        .modal-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: none;
            z-index: 1100;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-school"></i>
                <h2 id="schoolName">Loading...</h2>
                <p id="schoolType"></p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="teachers.html" class="nav-item">
                    <i class="fas fa-users"></i> Teachers
                </a>
                <a href="students.html" class="nav-item active">
                    <i class="fas fa-user-graduate"></i> Students
                </a>
                <a href="parents.html" class="nav-item">
                    <i class="fas fa-family"></i> Parents
                </a>
                <a href="classes.html" class="nav-item">
                    <i class="fas fa-book"></i> Classes
                </a>
                <a href="fee-structure.html" class="nav-item">
                    <i class="fas fa-coins"></i> Fee Structure
                </a>
                <a href="fee-payments.html" class="nav-item">
                    <i class="fas fa-credit-card"></i> Payments
                </a>
                <a href="fee-reports.html" class="nav-item">
                    <i class="fas fa-chart-pie"></i> Reports
                </a>
                <a href="notifications.html" class="nav-item">
                    <i class="fas fa-bell"></i> Notifications
                </a>
                <a href="student-results.html" class="nav-item">
    <i class="fas fa-chart-line"></i> Student Results
</a>
            </nav>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-user-graduate" style="margin-right: 10px; color: #667eea;"></i>Students Management</h1>
                </div>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Total Students</h3>
                        <div class="number" id="totalStudents">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Boys</h3>
                        <div class="number" id="totalBoys">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-mars"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Girls</h3>
                        <div class="number" id="totalGirls">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-venus"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>With Login</h3>
                        <div class="number" id="totalWithLogin">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-key"></i>
                    </div>
                </div>
            </div>
            
            <!-- Action Bar -->
            <div class="action-bar">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by name or admission...">
                    <select id="classFilter" class="filter-select">
                        <option value="">All Classes</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="openAddModal()">
                    <i class="fas fa-plus"></i> Add Student
                </button>
            </div>
            
            <!-- Students Grid -->
            <div id="studentsContainer" class="students-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading students...
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Student Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Student</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="studentForm">
                <input type="hidden" id="studentId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" id="dob" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Gender *</label>
                        <select id="gender" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Admission Number *</label>
                        <input type="text" id="admissionNumber" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Class *</label>
                        <select id="classSelect" required onchange="loadStreams()">
                            <option value="">Select Class</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Stream *</label>
                    <select id="streamSelect" required>
                        <option value="">Select Stream</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Parent Phone *</label>
                    <input type="tel" id="parentPhone" required>
                </div>
                
                <div class="form-group">
                    <label>Parent Email</label>
                    <input type="email" id="parentEmail">
                </div>
                
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" rows="2"></textarea>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Student</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Message Toast -->
    <div id="messageToast" class="message"></div>
    
    <script src="../../js/firebase-config.js"></script>
    <script>
        let currentUser = null;
        let currentSchool = null;
        let currentSchoolId = null;
        let editingId = null;
        let students = [];
        let allClasses = [];
        let allStreams = [];
        let studentLogins = new Map();
        
        function showMessage(text, type) {
            const toast = document.getElementById('messageToast');
            toast.textContent = text;
            toast.className = `message ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = '../../login.html';
                return;
            }
            
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                currentSchoolId = userData.schoolId;
                
                const schoolDoc = await db.collection('schools').doc(userData.schoolId).get();
                currentSchool = schoolDoc.data();
                
                document.getElementById('schoolName').textContent = currentSchool.name;
                document.getElementById('schoolType').textContent = 
                    currentSchool.type === 'primary' ? 'Primary School' : 'High School';
                
                // Load all data from database
                await loadAllData();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error loading data', 'error');
            }
        });
        
        async function loadAllData() {
            try {
                // Load classes
                const classesSnapshot = await db.collection('classes')
                    .where('schoolId', '==', currentSchoolId)
                    .orderBy('name')
                    .get();
                
                allClasses = [];
                classesSnapshot.forEach(doc => {
                    allClasses.push({
                        id: doc.id,
                        name: doc.data().name
                    });
                });
                
                // Load streams
                const streamsSnapshot = await db.collection('streams')
                    .where('schoolId', '==', currentSchoolId)
                    .get();
                
                allStreams = [];
                streamsSnapshot.forEach(doc => {
                    allStreams.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                // Load students
                await loadStudents();
                
                // Load student logins
                await loadStudentLogins();
                
                // Populate class dropdown
                populateClassDropdown();
                
                // Populate class filter
                populateClassFilter();
                
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }
        
        function populateClassDropdown() {
            const classSelect = document.getElementById('classSelect');
            classSelect.innerHTML = '<option value="">Select Class</option>';
            
            allClasses.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.name;
                option.textContent = cls.name;
                classSelect.appendChild(option);
            });
        }
        
        function populateClassFilter() {
            const filterSelect = document.getElementById('classFilter');
            filterSelect.innerHTML = '<option value="">All Classes</option>';
            
            allClasses.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.name;
                option.textContent = cls.name;
                filterSelect.appendChild(option);
            });
            
            // Also add streams to filter
            allStreams.forEach(stream => {
                const streamName = stream.fullName || stream.name;
                const option = document.createElement('option');
                option.value = streamName;
                option.textContent = streamName;
                filterSelect.appendChild(option);
            });
        }
        
        function loadStreams() {
            const selectedClass = document.getElementById('classSelect').value;
            const streamSelect = document.getElementById('streamSelect');
            
            streamSelect.innerHTML = '<option value="">Select Stream</option>';
            
            if (!selectedClass) return;
            
            // Add main class option
            const mainOption = document.createElement('option');
            mainOption.value = selectedClass;
            mainOption.textContent = `${selectedClass} (Main Class)`;
            streamSelect.appendChild(mainOption);
            
            // Add streams for this class
            const classStreams = allStreams.filter(s => s.className === selectedClass);
            
            classStreams.forEach(stream => {
                const streamName = stream.fullName || stream.name;
                const option = document.createElement('option');
                option.value = streamName;
                option.textContent = streamName;
                streamSelect.appendChild(option);
            });
        }
        
        async function loadStudentLogins() {
            const snapshot = await db.collection('users')
                .where('schoolId', '==', currentSchoolId)
                .where('role', '==', 'student')
                .get();
            
            studentLogins.clear();
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.studentId) {
                    studentLogins.set(data.studentId, {
                        email: data.email,
                        uid: doc.id
                    });
                }
            });
            
            document.getElementById('totalWithLogin').textContent = studentLogins.size;
        }
        
        async function loadStudents() {
            const snapshot = await db.collection('students')
                .where('schoolId', '==', currentSchoolId)
                .get();
            
            students = [];
            snapshot.forEach(doc => {
                students.push({ id: doc.id, ...doc.data() });
            });
            
            updateStats();
            displayStudents();
        }
        
        function updateStats() {
            const total = students.length;
            const boys = students.filter(s => s.gender === 'male').length;
            const girls = students.filter(s => s.gender === 'female').length;
            
            document.getElementById('totalStudents').textContent = total;
            document.getElementById('totalBoys').textContent = boys;
            document.getElementById('totalGirls').textContent = girls;
        }
        
        function displayStudents() {
            const container = document.getElementById('studentsContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const classFilter = document.getElementById('classFilter').value;
            
            let filtered = students;
            
            if (searchTerm) {
                filtered = filtered.filter(s => 
                    (s.firstName?.toLowerCase() + ' ' + s.lastName?.toLowerCase()).includes(searchTerm) ||
                    s.admissionNumber?.toLowerCase().includes(searchTerm)
                );
            }
            
            if (classFilter) {
                filtered = filtered.filter(s => s.studentClass === classFilter);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user-graduate"></i>
                        <h3>No Students Found</h3>
                        <p>Click "Add Student" to register a new student.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            filtered.forEach(s => {
                const initials = ((s.firstName?.[0] || '') + (s.lastName?.[0] || '')).toUpperCase() || 'S';
                const hasLogin = studentLogins.has(s.id);
                
                html += `
                    <div class="student-card">
                        <div class="student-header">
                            <div class="student-avatar">${initials}</div>
                            <div class="student-info">
                                <h3>${s.firstName || ''} ${s.lastName || ''}</h3>
                                <span class="admission">${s.admissionNumber || 'No ID'}</span>
                                ${hasLogin ? '<br><small style="color: #10b981;">✓ Login created</small>' : ''}
                            </div>
                        </div>
                        
                        <div class="student-details">
                            <div class="detail-row">
                                <span class="label">Class/Stream:</span>
                                <span class="value">${s.studentClass || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Gender:</span>
                                <span class="value">${s.gender || 'N/A'}</span>
                            </div>
                            <div class="detail-row">
                                <span class="label">Parent:</span>
                                <span class="value">${s.parentPhone || 'N/A'}</span>
                            </div>
                        </div>
                        
                        <div class="student-actions">
                            <button class="btn-icon edit" onclick="editStudent('${s.id}')">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            ${!hasLogin ? 
                                `<button class="btn-icon" onclick="createStudentLogin('${s.id}')">
                                    <i class="fas fa-key"></i> Create Login
                                </button>` : 
                                `<button class="btn-icon" onclick="showLoginDetails('${s.id}')">
                                    <i class="fas fa-eye"></i> View Login
                                </button>`
                            }
                            <button class="btn-icon delete" onclick="deleteStudent('${s.id}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const selectedStream = document.getElementById('streamSelect').value;
            
            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                name: document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value,
                admissionNumber: document.getElementById('admissionNumber').value,
                studentClass: selectedStream, // Save the exact stream value from database
                parentPhone: document.getElementById('parentPhone').value,
                parentEmail: document.getElementById('parentEmail').value,
                address: document.getElementById('address').value,
                schoolId: currentSchoolId,
                status: 'active',
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                if (editingId) {
                    await db.collection('students').doc(editingId).update(data);
                    showMessage('Student updated successfully', 'success');
                    closeModal();
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('students').add(data);
                    showMessage('Student added successfully', 'success');
                    closeModal();
                }
                
                await loadAllData();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error: ' + error.message, 'error');
            }
        });
        
        async function createStudentLogin(studentId) {
            const student = students.find(s => s.id === studentId);
            if (!student) return;
            
            try {
                const studentEmail = `${student.admissionNumber.toLowerCase()}@student.school.com`;
                const password = 'Student@123';
                
                const userCredential = await auth.createUserWithEmailAndPassword(studentEmail, password);
                
                await db.collection('users').doc(userCredential.user.uid).set({
                    uid: userCredential.user.uid,
                    name: student.name,
                    email: studentEmail,
                    role: 'student',
                    studentId: studentId,
                    schoolId: currentSchoolId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showMessage(`Login created: ${studentEmail}`, 'success');
                await loadStudentLogins();
                displayStudents();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error creating login', 'error');
            }
        }
        
        function showLoginDetails(studentId) {
            const student = students.find(s => s.id === studentId);
            const login = studentLogins.get(studentId);
            
            if (!student || !login) return;
            
            alert(`Student: ${student.name}\nEmail: ${login.email}\nPassword: Student@123`);
        }
        
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add New Student';
            document.getElementById('studentForm').reset();
            document.getElementById('studentModal').classList.add('active');
            
            // Reset and reload streams
            loadStreams();
        }
        
        async function editStudent(id) {
            const student = students.find(s => s.id === id);
            if (!student) return;
            
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Student';
            document.getElementById('studentId').value = id;
            document.getElementById('firstName').value = student.firstName || '';
            document.getElementById('lastName').value = student.lastName || '';
            document.getElementById('dob').value = student.dob || '';
            document.getElementById('gender').value = student.gender || '';
            document.getElementById('admissionNumber').value = student.admissionNumber || '';
            document.getElementById('parentPhone').value = student.parentPhone || '';
            document.getElementById('parentEmail').value = student.parentEmail || '';
            document.getElementById('address').value = student.address || '';
            
            // Set class and stream
            const studentClass = student.studentClass || '';
            
            // Find which class this stream belongs to
            let foundClass = '';
            for (const cls of allClasses) {
                if (studentClass === cls.name) {
                    foundClass = cls.name;
                    break;
                }
                // Check if it's a stream
                const stream = allStreams.find(s => (s.fullName || s.name) === studentClass);
                if (stream) {
                    foundClass = stream.className;
                    break;
                }
            }
            
            if (foundClass) {
                document.getElementById('classSelect').value = foundClass;
                loadStreams();
                
                // Small delay to ensure streams are loaded
                setTimeout(() => {
                    document.getElementById('streamSelect').value = studentClass;
                }, 100);
            }
            
            document.getElementById('studentModal').classList.add('active');
        }
        
        async function deleteStudent(id) {
            if (!confirm('Delete this student?')) return;
            
            try {
                await db.collection('students').doc(id).delete();
                showMessage('Student deleted', 'success');
                await loadAllData();
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error deleting student', 'error');
            }
        }
        
        function closeModal() {
            document.getElementById('studentModal').classList.remove('active');
        }
        
        document.getElementById('searchInput').addEventListener('input', displayStudents);
        document.getElementById('classFilter').addEventListener('change', displayStudents);
        
        function logout() {
            auth.signOut().then(() => window.location.href = '../../login.html');
        }
    </script>
</body>
</html>
